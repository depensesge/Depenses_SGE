<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const USERS = [
  { id:"admin",  name:"Administrateur", role:"admin",  pw:"admin2026", avatar:"👑" },
  { id:"u1",     name:"Youcef",         role:"member", pw:"y123",      avatar:"🧑" },
  { id:"u2",     name:"Souad",          role:"member", pw:"s123",      avatar:"🧑" },
  { id:"u3",     name:"Belmahi",        role:"member", pw:"b123",      avatar:"🧑" },
  { id:"u4",     name:"Tariq",          role:"member", pw:"t123",      avatar:"🧑" },
  { id:"u5",     name:"Amine",          role:"member", pw:"a123",      avatar:"🧑" },
];

const CATS = [
  { id:"siege",       label:"Frais Siège",   icon:"🏢", color:"#2563EB" },
  { id:"atelier",     label:"Frais Atelier", icon:"🔧", color:"#7C3AED" },
  { id:"projets",     label:"Frais Projets", icon:"📋", color:"#059669" },
  { id:"essence",     label:"Essence",       icon:"⛽", color:"#D97706" },
  { id:"maintenance", label:"Maintenance",   icon:"🚘", color:"#DC2626" },
  { id:"deplacement", label:"Déplacements",  icon:"✈️", color:"#0284C7" },
  { id:"repas",       label:"Repas",         icon:"🍽️", color:"#EA580C" },
  { id:"other",       label:"Autre",         icon:"📦", color:"#6B7280" },
];

function fmt(n)  { return new Intl.NumberFormat("fr-DZ",{maximumFractionDigits:0}).format(n||0)+" DA"; }
function fmtS(n) { return (n>=0?"+":"-")+new Intl.NumberFormat("fr-DZ",{maximumFractionDigits:0}).format(Math.abs(n||0))+" DA"; }
function getUser(id) { return USERS.find(u=>u.id===id)||{name:"?",avatar:"👤"}; }
function getCat(id)  { return CATS.find(c=>c.id===id)||CATS[CATS.length-1]; }

function calcSolde(userId, expenses, virements) {
  const virC = virements.filter(v=>v.toUserId===userId&&v.vtype==="caisse").reduce((s,v)=>s+(v.amount||0),0);
  const virB = virements.filter(v=>v.toUserId===userId&&v.vtype==="banque").reduce((s,v)=>s+(v.amount||0),0);
  const dep  = expenses.filter(e=>e.userId===userId).reduce((s,e)=>s+(e.amount||0),0);
  return { virC, virB, dep, solde: virC+virB-dep };
}

function groupByDate(arr) {
  const g = {};
  [...arr].sort((a,b)=>String(b.date).localeCompare(String(a.date))).forEach(e=>{
    const d = e.date||""; if(!g[d]) g[d]=[]; g[d].push(e);
  });
  return Object.entries(g);
}

function fmtDate(d) {
  try {
    const dt=new Date(d+"T00:00:00"), today=new Date(); today.setHours(0,0,0,0);
    const yest=new Date(today); yest.setDate(yest.getDate()-1);
    if(dt.getTime()===today.getTime()) return "Aujourd'hui";
    if(dt.getTime()===yest.getTime())  return "Hier";
    return dt.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  } catch { return d; }
}

function setSyncUI(ok, msg) {
  const d=document.getElementById("sdot"), m=document.getElementById("smsg");
  if(d) d.className="sdot "+(ok?"ok":"err");
  if(m) m.textContent=msg;
}

// ── Pie Chart Component ───────────────────────────────────────────────────────
function PieChart({ expenses, title }) {
  const catTotals = CATS.map(c=>({
    ...c,
    total: expenses.filter(e=>e.cat===c.id).reduce((s,e)=>s+(e.amount||0),0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  const total = catTotals.reduce((s,c)=>s+c.total,0);

  if (catTotals.length===0) return (
    <div className="pie">
      <div className="pie-title">{title}</div>
      <div className="pie-empty">📊 Aucune dépense</div>
    </div>
  );

  const R=80, r=44, cx=92, cy=92;
  let cum = -Math.PI/2;
  const slices = catTotals.map(c=>{
    const a = (c.total/total)*2*Math.PI;
    const x1=cx+R*Math.cos(cum), y1=cy+R*Math.sin(cum);
    cum += a;
    const x2=cx+R*Math.cos(cum), y2=cy+R*Math.sin(cum);
    const xi1=cx+r*Math.cos(cum-a), yi1=cy+r*Math.sin(cum-a);
    const xi2=cx+r*Math.cos(cum),   yi2=cy+r*Math.sin(cum);
    const lg = a>Math.PI?1:0;
    const d = [
      "M",x1.toFixed(1),y1.toFixed(1),
      "A",R,R,"0",lg,"1",x2.toFixed(1),y2.toFixed(1),
      "L",xi2.toFixed(1),yi2.toFixed(1),
      "A",r,r,"0",lg,"0",xi1.toFixed(1),yi1.toFixed(1),
      "Z"
    ].join(" ");
    return {...c, d, pct:((c.total/total)*100).toFixed(1)};
  });

  return (
    <div className="pie">
      <div className="pie-title">{title}</div>
      <svg width="184" height="184" viewBox="0 0 184 184">
        {slices.map(s=>(
          <path key={s.id} d={s.d} fill={s.color} stroke="#fff" strokeWidth="2">
            <title>{s.label} — {s.pct}%</title>
          </path>
        ))}
        <circle cx={cx} cy={cy} r="36" fill="#fff"/>
        <text x={cx} y={cy-7} textAnchor="middle" style={{fontSize:10,fill:"#6B7280",fontFamily:"Inter,sans-serif"}}>Total</text>
        <text x={cx} y={cy+8} textAnchor="middle" style={{fontSize:11,fill:"#111827",fontWeight:700,fontFamily:"Inter,sans-serif"}}>
          {total>=1000?(total/1000).toFixed(0)+"k":total} DA
        </text>
      </svg>
      <div className="pie-legend">
        {slices.map(s=>(
          <div key={s.id} className="pie-row">
            <div className="pie-dot" style={{background:s.color}}/>
            <span className="pie-label">{s.icon} {s.label}</span>
            <span className="pie-pct">{s.pct}%</span>
            <span className="pie-amt">{new Intl.NumberFormat("fr-DZ",{maximumFractionDigits:0}).format(s.total)} DA</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Rapport Component ────────────────────────────────────────────────────────
function RapportView({ expenses, virements, isAdmin, user, rpPeriod, setRpPeriod, rpOffset, setRpOffset, fmt, fmtS }) {
  const today = new Date();

  function getPeriodRange(period, offset) {
    const d = new Date(today);
    let start, end, label;
    if (period === "quotidien") {
      d.setDate(d.getDate() + offset);
      start = new Date(d); start.setHours(0,0,0,0);
      end   = new Date(d); end.setHours(23,59,59,999);
      label = d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      label = label.charAt(0).toUpperCase()+label.slice(1);
    } else if (period === "hebdo") {
      const day = d.getDay()||7;
      d.setDate(d.getDate() - day + 1 + offset*7);
      start = new Date(d); start.setHours(0,0,0,0);
      end   = new Date(start); end.setDate(end.getDate()+6); end.setHours(23,59,59,999);
      label = "Semaine du "+start.toLocaleDateString("fr-FR",{day:"numeric",month:"long"})+" au "+end.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    } else if (period === "mensuel") {
      const y = today.getFullYear(), m = today.getMonth() + offset;
      start = new Date(y, m, 1);
      end   = new Date(y, m+1, 0, 23, 59, 59);
      label = start.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
      label = label.charAt(0).toUpperCase()+label.slice(1);
    } else {
      const y = today.getFullYear() + offset;
      start = new Date(y, 0, 1);
      end   = new Date(y, 11, 31, 23, 59, 59);
      label = "Année "+y;
    }
    return { start, end, label };
  }

  const { start, end, label } = getPeriodRange(rpPeriod, rpOffset);

  const inPeriod = e => {
    const d = new Date((e.date||"")+"T00:00:00");
    return d >= start && d <= end;
  };

  const srcExp = (isAdmin ? expenses : expenses.filter(e=>e.userId===user?.id)).filter(inPeriod);
  const srcVir = (isAdmin ? virements : virements.filter(v=>v.toUserId===user?.id)).filter(inPeriod);

  const totalExp = srcExp.reduce((s,e)=>s+(e.amount||0),0);
  const totalVir = srcVir.reduce((s,v)=>s+(v.amount||0),0);
  const totalC   = srcVir.filter(v=>v.vtype==="caisse").reduce((s,v)=>s+(v.amount||0),0);
  const totalB   = srcVir.filter(v=>v.vtype==="banque").reduce((s,v)=>s+(v.amount||0),0);
  const solde    = totalVir - totalExp;

  const byCat = CATS.map(c=>({
    ...c, total: srcExp.filter(e=>e.cat===c.id).reduce((s,e)=>s+(e.amount||0),0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  const byMember = USERS.filter(u=>u.role==="member").map(u=>({
    ...u,
    dep: srcExp.filter(e=>e.userId===u.id).reduce((s,e)=>s+(e.amount||0),0),
    vir: srcVir.filter(v=>v.toUserId===u.id).reduce((s,v)=>s+(v.amount||0),0),
  })).filter(u=>u.dep>0||u.vir>0).sort((a,b)=>b.dep-a.dep);

  function exportRapport() {
    const rows = [
      ["Rapport — "+label],
      [],
      ["RÉSUMÉ"],
      ["Virements Caisse", totalC+" DA"],
      ["Virements Bancaire", totalB+" DA"],
      ["Total Virements", totalVir+" DA"],
      ["Total Dépenses", totalExp+" DA"],
      ["Solde", solde+" DA"],
      [],
      ["DÉPENSES PAR CATÉGORIE"],
      ["Catégorie","Montant (DA)","%"],
      ...byCat.map(c=>[c.label, c.total, totalExp>0?((c.total/totalExp)*100).toFixed(1)+"%":"0%"]),
      [],
      ...(isAdmin ? [
        ["PAR MEMBRE"],
        ["Membre","Dépenses","Virements reçus","Solde"],
        ...byMember.map(u=>[u.name, u.dep, u.vir, u.vir-u.dep]),
        [],
      ] : []),
      ["DÉTAIL DÉPENSES"],
      ["Date","Membre","Description","Catégorie","Montant (DA)"],
      ...[...srcExp].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>{
        const u=getUser(e.userId), c=getCat(e.cat);
        return [e.date, u.name, '"'+(e.label||"").replace(/"/g,'""')+'"', c.label, e.amount||0];
      }),
    ];
    const csv = "﻿"+rows.map(r=>r.join(";")).join("\n");
    const url = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    const a = document.createElement("a"); a.href=url; a.download="rapport_"+label.replace(/[^a-z0-9]/gi,"_")+".csv"; a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div className="fade">
      {/* Sélecteur période */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {[["quotidien","Jour"],["hebdo","Semaine"],["mensuel","Mois"],["annuel","Année"]].map(([k,lb])=>(
          <button key={k} className={"chip"+(rpPeriod===k?" on":"")} onClick={()=>{setRpPeriod(k);setRpOffset(0);}}>
            {lb}
          </button>
        ))}
        <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={exportRapport}>⬇ CSV</button>
      </div>

      {/* Navigation */}
      <div className="period-nav">
        <button className="period-btn" onClick={()=>setRpOffset(o=>o-1)}>‹</button>
        <div className="period-label">{label}</div>
        <button className="period-btn" onClick={()=>setRpOffset(o=>Math.min(o+1,0))} style={{opacity:rpOffset>=0?0.3:1}} disabled={rpOffset>=0}>›</button>
      </div>

      {/* Résumé 4 cartes */}
      <div className="rapport-grid">
        <div className="rp-card sel">
          <div className="rp-lbl">💸 Virements</div>
          <div className="rp-val">{fmt(totalVir)}</div>
          <div className="rp-sub">🏦 {fmt(totalC)} · 🏛️ {fmt(totalB)}</div>
        </div>
        <div className="rp-card">
          <div className="rp-lbl">💳 Dépenses</div>
          <div className="rp-val" style={{color:"var(--red)"}}>{fmt(totalExp)}</div>
          <div className="rp-sub">{srcExp.length} transaction(s)</div>
        </div>
        <div className="rp-card">
          <div className="rp-lbl">📊 Solde</div>
          <div className="rp-val" style={{color:solde>=0?"var(--green)":"var(--red)"}}>{fmtS(solde)}</div>
          <div className="rp-sub">Virements − Dépenses</div>
        </div>
        <div className="rp-card">
          <div className="rp-lbl">📋 Transactions</div>
          <div className="rp-val">{srcExp.length+srcVir.length}</div>
          <div className="rp-sub">{srcExp.length} dép. · {srcVir.length} vir.</div>
        </div>
      </div>

      {/* Par catégorie */}
      {byCat.length > 0 && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:"var(--gray-5)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Dépenses par catégorie</div>
          <div className="rp-table">
            <div className="rp-thead rp-cols-cat"><span>Catégorie</span><span style={{textAlign:"right"}}>%</span><span style={{textAlign:"right"}}>Montant</span></div>
            {byCat.map(c=>(
              <div key={c.id} className="rp-row rp-cols-cat">
                <span style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block",flexShrink:0}}/>
                  {c.icon} {c.label}
                </span>
                <span style={{textAlign:"right",color:"var(--gray-5)"}}>{totalExp>0?((c.total/totalExp)*100).toFixed(1):0}%</span>
                <span style={{textAlign:"right",fontWeight:700,color:c.color}}>{fmt(c.total)}</span>
              </div>
            ))}
            <div className="rp-total"><span>Total</span><span style={{color:"var(--red)"}}>{fmt(totalExp)}</span></div>
          </div>
        </>
      )}

      {/* Par membre (admin) */}
      {isAdmin && byMember.length > 0 && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:"var(--gray-5)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Par membre</div>
          <div className="rp-table">
            <div className="rp-thead" style={{gridTemplateColumns:"1fr 110px 110px 90px"}}>
              <span>Membre</span><span style={{textAlign:"right"}}>Virements</span><span style={{textAlign:"right"}}>Dépenses</span><span style={{textAlign:"right"}}>Solde</span>
            </div>
            {byMember.map(u=>(
              <div key={u.id} className="rp-row" style={{gridTemplateColumns:"1fr 110px 110px 90px"}}>
                <span>{u.avatar} {u.name}</span>
                <span style={{textAlign:"right",color:"var(--green)",fontWeight:600}}>{fmt(u.vir)}</span>
                <span style={{textAlign:"right",color:"var(--red)",fontWeight:600}}>{fmt(u.dep)}</span>
                <span style={{textAlign:"right",fontWeight:700,color:(u.vir-u.dep)>=0?"var(--green)":"var(--red)"}}>{fmtS(u.vir-u.dep)}</span>
              </div>
            ))}
          </div>
        </>
      )}

      {/* Détail dépenses */}
      {srcExp.length > 0 && (
        <>
          <div style={{fontSize:11,fontWeight:700,color:"var(--gray-5)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Détail des dépenses</div>
          <div className="rp-table">
            <div className="rp-thead" style={{gridTemplateColumns:"1fr 90px"}}>
              <span>Description</span><span style={{textAlign:"right"}}>Montant</span>
            </div>
            {[...srcExp].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>{
              const c=getCat(e.cat), u=getUser(e.userId);
              return (
                <div key={e.id} className="rp-row" style={{gridTemplateColumns:"1fr 90px"}}>
                  <span>
                    <div style={{fontWeight:600,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.label}</div>
                    <div style={{fontSize:10,color:"var(--gray-5)",marginTop:1,display:"flex",gap:5,flexWrap:"wrap"}}>
                      {isAdmin&&<span>{u.avatar} {u.name} ·</span>}
                      <span>{c.icon} {c.label}</span>
                      <span>· {new Date(e.date+"T00:00:00").toLocaleDateString("fr-FR")}</span>
                    </div>
                  </span>
                  <span style={{textAlign:"right",fontWeight:700,color:c.color}}>{fmt(e.amount)}</span>
                </div>
              );
            })}
            <div className="rp-total"><span>Total</span><span style={{color:"var(--red)"}}>{fmt(totalExp)}</span></div>
          </div>
        </>
      )}

      {srcExp.length===0 && srcVir.length===0 && (
        <div className="empty"><div style={{fontSize:32,marginBottom:8}}>📭</div><div style={{fontSize:13}}>Aucune donnée pour cette période</div></div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [user,      setUser]      = useState(()=>{ try{const s=localStorage.getItem("dp_s");return s?JSON.parse(s):null;}catch{return null;} });
  const [loginStep, setLoginStep] = useState(null);
  const [pw,        setPw]        = useState("");
  const [pwErr,     setPwErr]     = useState(false);
  const [expenses,  setExpenses]  = useState([]);
  const [virements, setVirements] = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [toast,     setToast]     = useState(null);
  const [tab,       setTab]       = useState("depenses");
  const [filterCat, setFilterCat] = useState("all");
  const [selMember, setSelMember] = useState(null);
  const [showExp,   setShowExp]   = useState(false);
  const [rpPeriod,  setRpPeriod]  = useState("mensuel"); // quotidien|hebdo|mensuel|annuel
  const [rpOffset,  setRpOffset]  = useState(0); // 0=current, -1=previous, etc.
  const [showVir,   setShowVir]   = useState(false);
  const [expForm,   setExpForm]   = useState({label:"",amount:"",cat:"siege",date:new Date().toISOString().slice(0,10),note:""});
  const [virForm,   setVirForm]   = useState({label:"",amount:"",vtype:"caisse",toUserId:"u1",date:new Date().toISOString().slice(0,10),note:""});

  const isAdmin = user?.role==="admin";

  const load = useCallback(async()=>{
    try {
      const [exps,virs] = await Promise.all([FB.getExp(), FB.getVir()]);
      setExpenses(exps); setVirements(virs);
      setSyncUI(true,"Synchronisé · "+new Date().toLocaleTimeString("fr-FR"));
    } catch { setSyncUI(false,"Erreur de connexion"); }
  },[]);

  useEffect(()=>{
    if(!user) return;
    load();
    const iv=setInterval(load,5000);
    const onVis=()=>{ if(document.visibilityState==="visible") load(); };
    document.addEventListener("visibilitychange",onVis);
    return()=>{ clearInterval(iv); document.removeEventListener("visibilitychange",onVis); };
  },[user?.id]);

  const showToast = msg=>{ setToast(msg); setTimeout(()=>setToast(null),2200); };

  // Filtered data
  const myExp = isAdmin
    ? (selMember ? expenses.filter(e=>e.userId===selMember) : expenses)
    : expenses.filter(e=>e.userId===user?.id);

  const myVir = isAdmin
    ? (selMember ? virements.filter(v=>v.toUserId===selMember) : virements)
    : virements.filter(v=>v.toUserId===user?.id);

  const filteredExp = myExp.filter(e=>filterCat==="all"||e.cat===filterCat);
  const grouped     = groupByDate(filteredExp);

  // Actions
  async function addExpense() {
    if(!expForm.label.trim()||!expForm.amount||isNaN(parseFloat(expForm.amount))) return;
    const e={id:Date.now(),userId:user.id,label:expForm.label.trim(),amount:parseFloat(expForm.amount),cat:expForm.cat,date:expForm.date,note:expForm.note||""};
    setExpenses(p=>[e,...p]); setShowExp(false);
    setExpForm({label:"",amount:"",cat:"siege",date:new Date().toISOString().slice(0,10),note:""});
    setLoading(true);
    try { await FB.addExp(e); await load(); showToast("✅ Dépense ajoutée"); }
    catch(err) { setExpenses(p=>p.filter(x=>String(x.id)!==String(e.id))); showToast("❌ "+err.message); }
    setLoading(false);
  }

  async function delExpense(id) {
    setExpenses(p=>p.filter(e=>String(e.id)!==String(id)));
    try { await FB.delExp(id); showToast("🗑️ Supprimée"); }
    catch { await load(); showToast("❌ Erreur"); }
  }

  async function addVirement() {
    if(!virForm.label.trim()||!virForm.amount||isNaN(parseFloat(virForm.amount))) return;
    const v={id:Date.now(),fromUserId:user.id,toUserId:virForm.toUserId,label:virForm.label.trim(),amount:parseFloat(virForm.amount),vtype:virForm.vtype,date:virForm.date,note:virForm.note||""};
    setVirements(p=>[v,...p]); setShowVir(false);
    setVirForm({label:"",amount:"",vtype:"caisse",toUserId:"u1",date:new Date().toISOString().slice(0,10),note:""});
    setLoading(true);
    try { await FB.addVir(v); await load(); showToast("✅ Virement enregistré"); }
    catch(err) { setVirements(p=>p.filter(x=>String(x.id)!==String(v.id))); showToast("❌ "+err.message); }
    setLoading(false);
  }

  async function delVirement(id) {
    setVirements(p=>p.filter(v=>String(v.id)!==String(id)));
    try { await FB.delVir(id); showToast("🗑️ Virement supprimé"); }
    catch { await load(); showToast("❌ Erreur"); }
  }

  function exportCSV() {
    const rows=[
      ["Type","Pour","Date","Description","Montant (DA)","Note"],
      ...virements.sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(v=>{
        const t=getUser(v.toUserId);
        return [v.vtype==="caisse"?"Virement Caisse":"Virement Bancaire",t.name,v.date,'"'+(v.label||"").replace(/"/g,'""')+'"',v.amount||0,v.note||""];
      }),
      ...expenses.sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>{
        const u=getUser(e.userId),c=getCat(e.cat);
        return ["Dépense",u.name,e.date,'"'+(e.label||"").replace(/"/g,'""')+'"',e.amount||0,e.note||""];
      }),
    ];
    const csv="\uFEFF"+rows.map(r=>r.join(";")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    const a=document.createElement("a"); a.href=url; a.download="finances.csv"; a.click(); URL.revokeObjectURL(url);
  }

  function doLogin() {
    if(pw===loginStep.pw) {
      localStorage.setItem("dp_s",JSON.stringify(loginStep));
      setUser(loginStep); setLoginStep(null); setPw(""); setPwErr(false);
    } else { setPwErr(true); setPw(""); }
  }

  // ── LOGIN ──────────────────────────────────────────────────────────────────
  if(!user) return (
    <div className="login">
      <div className="login-box">
        <div className="login-logo">
          <h1>💰 Dépenses Équipe SGE SGE SGE</h1>
          <p>Caisse individuelle · Suivi partagé</p>
        </div>
        {!loginStep ? (
          <div className="profiles">
            {USERS.map(u=>(
              <button key={u.id} className={"pbtn"+(u.role==="admin"?" adm":"")} onClick={()=>{setLoginStep(u);setPw("");setPwErr(false);}}>
                <div className={"pav "+(u.role==="admin"?"a":"m")}>{u.avatar}</div>
                <div>
                  <div className="pname">{u.name}</div>
                  <div className="prole">{u.role==="admin"?"Administrateur":"Membre"}</div>
                </div>
                <span style={{marginLeft:"auto",color:"#9CA3AF",fontSize:16}}>›</span>
              </button>
            ))}
          </div>
        ) : (
          <div>
            <button className="pw-back" onClick={()=>setLoginStep(null)}>← Retour</button>
            <div style={{fontSize:15,fontWeight:700,color:"var(--gray-9)",marginBottom:2}}>{loginStep.avatar} {loginStep.name}</div>
            <div style={{fontSize:12,color:"var(--gray-5)",marginBottom:14}}>Entrez votre mot de passe</div>
            <input autoFocus type="password" className={"inp"+(pwErr?" err":"")} placeholder="••••••••"
              value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&doLogin()} style={{marginBottom:pwErr?0:12}}/>
            {pwErr&&<div className="errmsg" style={{marginBottom:10}}>Mot de passe incorrect.</div>}
            <button className="btn btn-blue w-full" onClick={doLogin} style={{marginTop:pwErr?10:0}}>Se connecter →</button>
          </div>
        )}
      </div>
    </div>
  );

  // ── MAIN APP ───────────────────────────────────────────────────────────────
  return (
    <div className="app">
      {toast && <div className="toast sup">{toast}</div>}
      {loading && <div className="loadbar"/>}

      {/* TOPBAR */}
      <div className="topbar">
        <div className="tbi">
          <div className="tb-logo">💰 Dépenses Équipe SGE SGE SGE</div>
          <div className="tb-right">
            {isAdmin && <button className="btn btn-green btn-sm" onClick={()=>setShowVir(true)} title="Virement"><span className="hide-xs">💸 </span>Virement</button>}
            <button className="btn btn-blue btn-sm" onClick={()=>setShowExp(true)} title="Dépense">+ <span className="hide-xs">Dépense</span></button>
            {isAdmin && <button className="btn btn-ghost btn-sm btn-icon" onClick={exportCSV} title="Export CSV">⬇</button>}
            <div style={{textAlign:"right"}}>
              <div className="tb-name">{user.avatar} {user.name}</div>
              <div className="tb-role">{isAdmin?"Admin":"Membre"}</div>
            </div>
            <button className="btn btn-ghost btn-sm btn-icon" title="Déconnexion"
              onClick={()=>{localStorage.removeItem("dp_s");setUser(null);}}>⏏</button>
          </div>
        </div>
      </div>

      {/* MAIN LAYOUT: gauche + droite */}
      <div className="main-layout fade">

        {/* GAUCHE */}
        <div className="layout-left">
          {isAdmin ? (
            /* Admin: cartes membres */
            <>
              <div style={{fontSize:11,fontWeight:700,color:"var(--gray-5)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:2}}>
                Caisse par membre
                {selMember && <span style={{color:"var(--blue)",cursor:"pointer",fontWeight:500,marginLeft:8}} onClick={()=>setSelMember(null)}>← Tout</span>}
              </div>
              {USERS.filter(u=>u.role==="member").map((u,idx,arr)=>{
                const s = calcSolde(u.id,expenses,virements);
                const showSep = idx>0 && arr[idx-1].name==="Tariq" && u.name==="Amine";
                return (
                  <React.Fragment key={u.id}>
                    {showSep && <div className="sep"/>}
                    <div className={"mc"+(selMember===u.id?" sel":"")} onClick={()=>setSelMember(selMember===u.id?null:u.id)}>
                      <div className="mc-head">
                        <div className="mc-av">{u.avatar}</div>
                        <div>
                          <div className="mc-name">{u.name}</div>
                          <div className="mc-sub">{expenses.filter(e=>e.userId===u.id).length} dépense(s)</div>
                        </div>
                        <div style={{marginLeft:"auto",textAlign:"right"}}>
                          <div style={{fontSize:14,fontWeight:800,color:s.solde>=0?"var(--green)":"var(--red)"}}>{fmtS(s.solde)}</div>
                          <div style={{fontSize:10,color:"var(--gray-5)"}}>Solde</div>
                        </div>
                      </div>
                      <div className="mc-body">
                        <div className="mc-stat">
                          <div className="mc-lbl">🏦 Caisse</div>
                          <div className="mc-val" style={{color:"var(--purple)"}}>{fmt(s.virC)}</div>
                        </div>
                        <div className="mc-stat">
                          <div className="mc-lbl">🏛️ Banque</div>
                          <div className="mc-val" style={{color:"var(--cyan)"}}>{fmt(s.virB)}</div>
                        </div>
                        <div className="mc-stat">
                          <div className="mc-lbl">💳 Dépenses</div>
                          <div className="mc-val" style={{color:"var(--red)"}}>{fmt(s.dep)}</div>
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </>
          ) : (
            /* Membre: cartes solde */
            (() => {
              const s = calcSolde(user.id, expenses, virements);
              return (
                <>
                  <div className="sc caisse">
                    <div className="sc-lbl">🏦 Virement Caisse</div>
                    <div className="sc-val" style={{color:"var(--purple)"}}>{fmt(s.virC)}</div>
                  </div>
                  <div className="sc banque">
                    <div className="sc-lbl">🏛️ Virement Bancaire</div>
                    <div className="sc-val" style={{color:"var(--cyan)"}}>{fmt(s.virB)}</div>
                  </div>
                  <div className="sc global">
                    <div className="sc-lbl">📊 Mon Solde</div>
                    <div className="sc-val" style={{color:s.solde>=0?"var(--green)":"var(--red)"}}>{fmtS(s.solde)}</div>
                    <div className="sc-rows">
                      <div className="sc-row">
                        <div className="sc-row-lbl">Total reçu</div>
                        <div className="sc-row-val" style={{color:"var(--green)"}}>{fmt(s.virC+s.virB)}</div>
                      </div>
                      <div className="sc-row">
                        <div className="sc-row-lbl">Dépensé</div>
                        <div className="sc-row-val" style={{color:"var(--red)"}}>{fmt(s.dep)}</div>
                      </div>
                    </div>
                  </div>
                </>
              );
            })()
          )}
        </div>

        {/* DROITE: camembert */}
        <div className="layout-right">
          <PieChart
            expenses={isAdmin ? (selMember ? expenses.filter(e=>e.userId===selMember) : expenses) : expenses.filter(e=>e.userId===user?.id)}
            title={"📊 "+(isAdmin?(selMember?getUser(selMember).name+" — ":"Équipe — "):"Mes ")+"dépenses par catégorie"}
          />
        </div>
      </div>

      {/* TABS */}
      <div className="tab-bar">
        <button className={"tab"+(tab==="depenses"?" on":"")} onClick={()=>setTab("depenses")}>
          💳 Dépenses ({filteredExp.length})
        </button>
        <button className={"tab"+(tab==="virements"?" on":"")} onClick={()=>setTab("virements")}>
          💸 Virements ({myVir.length})
        </button>
        <button className={"tab"+(tab==="rapport"?" on":"")} onClick={()=>setTab("rapport")}>
          📊 Rapport
        </button>
      </div>

      {/* DÉPENSES */}
      {tab==="depenses" && (
        <div className="fade">
          <div className="toolbar">
            <button className={"chip"+(filterCat==="all"?" on":"")} onClick={()=>setFilterCat("all")}>Toutes</button>
            {CATS.filter(c=>myExp.some(e=>e.cat===c.id)).map(c=>(
              <button key={c.id} className={"chip"+(filterCat===c.id?" on":"")}
                style={filterCat===c.id?{background:c.color,borderColor:c.color}:{}}
                onClick={()=>setFilterCat(filterCat===c.id?"all":c.id)}>
                {c.icon} {c.label}
              </button>
            ))}
          </div>
          <div className="list">
            {grouped.length===0 ? (
              <div className="empty"><div style={{fontSize:32,marginBottom:8}}>📭</div><div style={{fontSize:13}}>Aucune dépense</div></div>
            ) : grouped.map(([date,items])=>(
              <div key={date}>
                <div className="date-sep">{fmtDate(date)}</div>
                {items.map(exp=>{
                  const c=getCat(exp.cat), u=getUser(exp.userId);
                  const canDel = isAdmin||exp.userId===user.id;
                  return (
                    <div key={exp.id} className="exp-card" style={{borderLeftColor:c.color}}>
                      <div className="exp-icon" style={{background:c.color+"18"}}>{c.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="exp-name">{exp.label}</div>
                        <div className="exp-meta">
                          <span>{u.avatar} {u.name}</span>
                          <span className="dot"/>
                          <span>{c.label}</span>
                          {exp.note&&<><span className="dot"/><span style={{fontStyle:"italic"}}>{exp.note}</span></>}
                        </div>
                      </div>
                      <div className="exp-amt" style={{color:c.color}}>{fmt(exp.amount)}</div>
                      {canDel&&(
                        <div className="exp-acts">
                          <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>delExpense(exp.id)}>🗑️</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* VIREMENTS */}
      {tab==="virements" && (
        <div className="fade">
          <div className="list">
            {myVir.length===0 ? (
              <div className="empty">
                <div style={{fontSize:32,marginBottom:8}}>💸</div>
                <div style={{fontSize:13}}>Aucun virement</div>
                {isAdmin&&<button className="btn btn-green" style={{marginTop:14}} onClick={()=>setShowVir(true)}>+ Virement</button>}
              </div>
            ) : [...myVir].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(vir=>{
              const isC=vir.vtype==="caisse", to=getUser(vir.toUserId);
              const canDel=isAdmin;
              return (
                <div key={vir.id} className={"vir-card "+vir.vtype}>
                  <div style={{width:36,height:36,borderRadius:9,background:isC?"var(--purple-l)":"var(--cyan-l)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                    {isC?"🏦":"🏛️"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--gray-9)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{vir.label}</div>
                    <div style={{fontSize:11,color:"var(--gray-5)",marginTop:2,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                      <span className={"badge "+vir.vtype}>{isC?"🏦 Caisse":"🏛️ Bancaire"}</span>
                      <span className="dot"/>
                      <span>→ {to.avatar} {to.name}</span>
                      <span className="dot"/>
                      <span>{new Date(vir.date+"T00:00:00").toLocaleDateString("fr-FR")}</span>
                      {vir.note&&<><span className="dot"/><span style={{fontStyle:"italic"}}>{vir.note}</span></>}
                    </div>
                  </div>
                  <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,fontWeight:800,color:isC?"var(--purple)":"var(--cyan)",whiteSpace:"nowrap"}}>{fmt(vir.amount)}</div>
                  {canDel&&(
                    <div className="exp-acts" style={{opacity:1}}>
                      <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>delVirement(vir.id)}>🗑️</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* RAPPORT */}
      {tab==="rapport" && RapportView({
        expenses, virements, isAdmin, user, rpPeriod, setRpPeriod, rpOffset, setRpOffset, fmt, fmtS
      })}
      {/* FORM DÉPENSE */}
      {showExp && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowExp(false)}>
          <div className="modal">
            <div className="modal-title">+ Nouvelle dépense</div>
            <div className="fg">
              <label className="fl">Catégorie</label>
              <div className="cat-pick">
                {CATS.map(c=>(
                  <button key={c.id} className={"cpill"+(expForm.cat===c.id?" on":"")}
                    style={expForm.cat===c.id?{borderColor:c.color,background:c.color+"15",color:c.color}:{}}
                    onClick={()=>setExpForm(f=>({...f,cat:c.id}))}>
                    {c.icon} {c.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Description</label>
              <input className="inp" placeholder="Ex: Carburant, Repas..." value={expForm.label} onChange={e=>setExpForm(f=>({...f,label:e.target.value}))} autoFocus/>
            </div>
            <div className="form-row">
              <div className="fg">
                <label className="fl">Montant (DA)</label>
                <input className="inp" type="number" placeholder="0" value={expForm.amount} onChange={e=>setExpForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div className="fg">
                <label className="fl">Date</label>
                <input className="inp" type="date" value={expForm.date} onChange={e=>setExpForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="fg">
              <label className="fl">Note (optionnel)</label>
              <input className="inp" placeholder="Précisions..." value={expForm.note} onChange={e=>setExpForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="mf">
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowExp(false)}>Annuler</button>
              <button className="btn btn-green" style={{flex:2}} onClick={addExpense} disabled={loading}>{loading?"Envoi...":"Ajouter ✓"}</button>
            </div>
          </div>
        </div>
      )}

      {/* FORM VIREMENT (admin) */}
      {showVir && isAdmin && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowVir(false)}>
          <div className="modal">
            <div className="modal-title">💸 Nouveau virement</div>
            <div className="fg">
              <label className="fl">Type de virement</label>
              <div className="type-row">
                {[["caisse","🏦","Virement Caisse"],["banque","🏛️","Virement Bancaire"]].map(([k,ic,lb])=>(
                  <div key={k} className={"tbtn "+k+(virForm.vtype===k?" on":"")} onClick={()=>setVirForm(f=>({...f,vtype:k}))}>
                    <div style={{fontSize:20,marginBottom:3}}>{ic}</div>
                    <div style={{fontSize:12,fontWeight:600,color:"var(--gray-9)"}}>{lb}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Pour le membre</label>
              <select className="inp" value={virForm.toUserId} onChange={e=>setVirForm(f=>({...f,toUserId:e.target.value}))}>
                {USERS.filter(u=>u.role==="member").map(u=><option key={u.id} value={u.id}>{u.avatar} {u.name}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">Description</label>
              <input className="inp" placeholder="Ex: Dotation caisse Mars..." value={virForm.label} onChange={e=>setVirForm(f=>({...f,label:e.target.value}))} autoFocus/>
            </div>
            <div className="form-row">
              <div className="fg">
                <label className="fl">Montant (DA)</label>
                <input className="inp" type="number" placeholder="0" value={virForm.amount} onChange={e=>setVirForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div className="fg">
                <label className="fl">Date</label>
                <input className="inp" type="date" value={virForm.date} onChange={e=>setVirForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="fg">
              <label className="fl">Note (optionnel)</label>
              <input className="inp" placeholder="Précisions..." value={virForm.note} onChange={e=>setVirForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="mf">
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowVir(false)}>Annuler</button>
              <button className={"btn "+(virForm.vtype==="caisse"?"btn-blue":"btn-green")} style={{flex:2}} onClick={addVirement} disabled={loading}>
                {loading?"Envoi...":(virForm.vtype==="caisse"?"🏦":"🏛️")+" Enregistrer"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
