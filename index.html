<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestion Dépenses Équipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDOG7S4hWibxGwVBe59ybUmGuJ0r-tnZxI",
      authDomain: "gestion-depenses-6bfcc.firebaseapp.com",
      databaseURL: "https://gestion-depenses-6bfcc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gestion-depenses-6bfcc",
      storageBucket: "gestion-depenses-6bfcc.firebasestorage.app",
      messagingSenderId: "474872789938",
      appId: "1:474872789938:web:d3821e317551b8956542ab"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F0F13; font-family: 'DM Mono', 'Courier New', monospace; color: #F0EDE8; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1A1A22; }
    ::-webkit-scrollbar-thumb { background: #3A3A4A; border-radius: 2px; }
    input, select, textarea { outline: none; font-family: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; }
    .fade  { animation: fadeIn .35s ease forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .pop   { animation: popIn .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes popIn  { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    .sup   { animation: sup .3s ease forwards; }
    @keyframes sup    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .ucard { transition: all .2s; }
    .ucard:hover { transform: translateY(-2px); background: #222230 !important; }
    .row   { transition: background .15s; }
    .row:hover { background: #1E1E28 !important; }
    .act   { opacity: 0; transition: opacity .2s; }
    .row:hover .act { opacity: 1; }
    .tab   { transition: all .2s; }
    .tab:hover { opacity: .8; }
    .fab   { transition: transform .15s, box-shadow .15s; }
    .fab:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(232,132,90,.4); }
    .pill  { transition: all .2s; }
    .pill:hover { transform: translateY(-1px); }
    .cdot  { transition: transform .15s; cursor: pointer; border-radius: 50%; }
    .cdot:hover { transform: scale(1.2); }
    .abtn:hover { background: #5AE89B33 !important; }
    .rbtn:hover { background: #E85A5A33 !important; }
    #root  { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 90px; }

    /* Bandeau sync */
    #sync-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1A1A22; border-top: 1px solid #2A2A38;
      display: flex; align-items: center; justify-content: center; gap: 8px; padding: 6px 16px; font-size: 10px; color: #444; z-index: 50; }
    #sync-bar span { color: #5AE89B; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="sync-bar">🔥 Firebase · Synchronisation temps réel — Dernière mise à jour : <span id="sync-time">—</span></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const DEFAULT_CATS = [
  { id:"food",      label:"Alimentation", icon:"🍽️", color:"#E8845A" },
  { id:"transport", label:"Transport",    icon:"🚗",  color:"#5A9BE8" },
  { id:"housing",   label:"Logement",     icon:"🏠",  color:"#8B5AE8" },
  { id:"health",    label:"Santé",        icon:"💊",  color:"#5AE89B" },
  { id:"leisure",   label:"Loisirs",      icon:"🎬",  color:"#E8D45A" },
  { id:"shopping",  label:"Shopping",     icon:"🛍️", color:"#E85A9B" },
  { id:"other",     label:"Autre",        icon:"📦",  color:"#A0A0A0" },
];
const COLORS = ["#E8845A","#5A9BE8","#8B5AE8","#5AE89B","#E8D45A","#E85A9B","#A0A0A0","#E85A5A","#5AE8E8","#E8A85A","#7AE85A","#E8C85A"];
const ICONS  = ["🍽️","🚗","🏠","💊","🎬","🛍️","📦","✈️","📚","🎮","⚽","🏋️","💄","🐾","☕","🍕","🛒","💡","📱","🎓","🏦","🎁"];

const DEFAULT_USERS = [
  { id:"admin",  name:"Youcef",   role:"admin",  avatar:"👑", password:"admin2026" },
  { id:"admin2", name:"Souad",    role:"admin",  avatar:"👑", password:"admin2027" },
  { id:"user1",  name:"Belmahi",  role:"member", avatar:"👤", password:"b123"      },
  { id:"user2",  name:"Tariq",    role:"member", avatar:"👤", password:"t123"      },
  { id:"user3",  name:"Amine",    role:"member", avatar:"👤", password:"a123"      },
];

const SEED_EXP = [];

const STATUS = {
  pending:  { label:"En attente", color:"#E8D45A", bg:"#E8D45A18", icon:"⏳" },
  approved: { label:"Approuvée",  color:"#5AE89B", bg:"#5AE89B18", icon:"✅" },
  rejected: { label:"Refusée",    color:"#E85A5A", bg:"#E85A5A18", icon:"❌" },
};

function fmt(n) { return new Intl.NumberFormat("fr-DZ",{maximumFractionDigits:0}).format(n) + " DA"; }

// ── Firebase helpers
const LS = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    try { db.ref(key).set(val); updateSyncTime(); } catch {}
  },
};

function updateSyncTime() {
  const el = document.getElementById("sync-time");
  if (el) el.textContent = new Date().toLocaleTimeString("fr-FR");
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [currentUser,  setCurrentUser]  = useState(null);
  const [loginStep,    setLoginStep]    = useState(null); // null | user object (waiting for password)
  const [passwordInput,setPasswordInput]= useState("");
  const [passwordError,setPasswordError]= useState(false);
  const [users,        setUsers]        = useState(() => LS.get("eq_users",    DEFAULT_USERS));
  const [categories,   setCategories]   = useState(() => LS.get("eq_cats",     DEFAULT_CATS));
  const [expenses,     setExpenses]     = useState(() => LS.get("eq_expenses", SEED_EXP));
  const [view,         setView]         = useState("list");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterMember, setFilterMember] = useState("all");
  const [showForm,     setShowForm]     = useState(false);
  const [editingCat,   setEditingCat]   = useState(null);
  const [iconOpen,     setIconOpen]     = useState(false);
  const [rejectId,     setRejectId]     = useState(null);
  const [rejectNote,   setRejectNote]   = useState("");
  const [animNew,      setAnimNew]      = useState(null);
  const [toast,        setToast]        = useState(null);
  const [form, setForm] = useState({ label:"", amount:"", category:"food", date:new Date().toISOString().slice(0,10), note:"" });
  const nextId    = useRef(LS.get("eq_nextid",    500));
  const nextCatId = useRef(LS.get("eq_nextcatid", 600));

  const isAdmin = currentUser?.role === "admin";

  // Firebase realtime listeners
  useEffect(() => {
    if (!currentUser) return;
    const refs = [];

    const expRef = db.ref("eq_expenses");
    expRef.on("value", snap => { if (snap.exists()) setExpenses(snap.val()); });
    refs.push(expRef);

    const catRef = db.ref("eq_cats");
    catRef.on("value", snap => { if (snap.exists()) setCategories(snap.val()); });
    refs.push(catRef);

    const usrRef = db.ref("eq_users");
    usrRef.on("value", snap => { if (snap.exists()) setUsers(snap.val()); });
    refs.push(usrRef);

    return () => refs.forEach(r => r.off());
  }, [currentUser]);

  const saveExpenses   = (v) => { setExpenses(v);   LS.set("eq_expenses", v); LS.set("eq_nextid", nextId.current); };
  const saveCategories = (v) => { setCategories(v); LS.set("eq_cats", v); };
  const saveUsers      = (v) => { setUsers(v);      LS.set("eq_users", v); };

  const showToast = (msg, color="#5AE89B") => { setToast({msg,color}); setTimeout(()=>setToast(null),2500); };
  const getCat    = (id) => categories.find(c=>c.id===id) || {label:"Autre",icon:"📦",color:"#A0A0A0"};
  const getUser   = (id) => users.find(u=>u.id===id)      || {name:"Inconnu",avatar:"👤"};

  // ── Derived ────────────────────────────────────────────────────────────────
  const visibleExp = isAdmin
    ? expenses.filter(e => (filterStatus==="all"||e.status===filterStatus) && (filterMember==="all"||e.userId===filterMember))
    : expenses.filter(e => e.userId===currentUser?.id);

  const approvedExp = isAdmin
    ? expenses.filter(e=>e.status==="approved")
    : expenses.filter(e=>e.userId===currentUser?.id && e.status==="approved");

  const myTotal    = approvedExp.reduce((s,e)=>s+e.amount, 0);

  const pendingN   = expenses.filter(e=>e.status==="pending").length;
  const statTotal  = approvedExp.reduce((s,e)=>s+e.amount, 0);

  const byCat = categories.map(c=>{
    const total = approvedExp.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
    return {...c, total, pct: statTotal>0?(total/statTotal)*100:0};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // ── Actions ────────────────────────────────────────────────────────────────
  function addExpense() {
    if (!form.label||!form.amount||isNaN(parseFloat(form.amount))) return;
    const e = {id:nextId.current++, userId:currentUser.id, label:form.label, amount:parseFloat(form.amount), category:form.category, date:form.date, note:form.note, status:"pending"};
    saveExpenses([e,...expenses]);
    setAnimNew(e.id); setTimeout(()=>setAnimNew(null),600);
    setForm({label:"",amount:"",category:"food",date:new Date().toISOString().slice(0,10),note:""});
    setShowForm(false);
    showToast("Dépense soumise ⏳","#E8D45A");
  }
  function approve(id) { saveExpenses(expenses.map(e=>e.id===id?{...e,status:"approved",rejectNote:undefined}:e)); showToast("Approuvée ✅"); }
  function reject(id)  { saveExpenses(expenses.map(e=>e.id===id?{...e,status:"rejected",rejectNote}:e)); setRejectId(null); setRejectNote(""); showToast("Refusée","#E85A5A"); }
  function delExp(id)  { saveExpenses(expenses.filter(e=>e.id!==id)); }
  function saveCat() {
    if (!editingCat.label.trim()) return;
    const updated = editingCat.id
      ? categories.map(c=>c.id===editingCat.id?{...editingCat}:c)
      : [...categories,{...editingCat,id:"cat_"+(nextCatId.current++)}];
    saveCategories(updated); setEditingCat(null);
  }
  function delCat(id) {
    saveCategories(categories.filter(c=>c.id!==id));
    saveExpenses(expenses.map(e=>e.category===id?{...e,category:"other"}:e));
  }
  function exportCSV() {
    const rows = [
      ["Date","Membre","Description","Catégorie","Montant (DA)","Statut","Note refus"],
      ...expenses.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
        const c=getCat(e.category); const u=getUser(e.userId);
        return [e.date,u.name,`"${e.label.replace(/"/g,'""')}"`,c.label,e.amount,STATUS[e.status].label,e.rejectNote||""];
      }),
    ];
    const csv="\uFEFF"+rows.map(r=>r.join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="depenses_equipe.csv"; a.click();
    URL.revokeObjectURL(url);
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  function handleSelectUser(u) {
    setLoginStep(u);
    setPasswordInput("");
    setPasswordError(false);
  }

  function handlePasswordSubmit() {
    if (passwordInput === loginStep.password) {
      setCurrentUser(loginStep);
      setLoginStep(null);
      setPasswordInput("");
      setPasswordError(false);
    } else {
      setPasswordError(true);
      setPasswordInput("");
    }
  }

  if (!currentUser) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"20px",width:"100%",maxWidth:440,margin:"0 auto"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,letterSpacing:"-0.5px",marginBottom:4}}>GESTION DÉPENSES</div>
      <div style={{fontSize:10,color:"#555",letterSpacing:"0.15em",marginBottom:36}}>ÉQUIPE · MARS 2026</div>

      {!loginStep ? (
        <>
          <div style={{fontSize:10,color:"#444",letterSpacing:"0.1em",marginBottom:12,alignSelf:"flex-start"}}>CHOISIR VOTRE PROFIL</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%"}}>
            {users.map(u=>(
              <button key={u.id} className="ucard" onClick={()=>handleSelectUser(u)}
                style={{background:"#16161E",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,textAlign:"left",border:u.role==="admin"?"1px solid #E8845A33":"1px solid transparent",width:"100%"}}>
                <div style={{fontSize:26}}>{u.avatar}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500}}>{u.name}</div>
                  <div style={{fontSize:10,color:u.role==="admin"?"#E8845A":"#555",marginTop:2}}>
                    {u.role==="admin"?"👑 ADMINISTRATEUR":"Membre"}
                  </div>
                </div>
                <div style={{fontSize:18,color:"#333"}}>›</div>
              </button>
            ))}
          </div>
        </>
      ) : (
        <div style={{width:"100%"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
            <button onClick={()=>setLoginStep(null)} style={{background:"#1A1A22",color:"#888",borderRadius:8,padding:"6px 12px",fontSize:11}}>← Retour</button>
            <div style={{fontSize:13,fontWeight:500}}>{loginStep.avatar} {loginStep.name}</div>
          </div>
          <div style={{fontSize:10,color:"#444",letterSpacing:"0.1em",marginBottom:10}}>MOT DE PASSE</div>
          <input
            autoFocus
            type="password"
            placeholder="Entrez votre mot de passe..."
            value={passwordInput}
            onChange={e=>{setPasswordInput(e.target.value);setPasswordError(false);}}
            onKeyDown={e=>e.key==="Enter"&&handlePasswordSubmit()}
            style={{width:"100%",background:"#16161E",border:passwordError?"1px solid #E85A5A":"1px solid #2A2A38",borderRadius:10,padding:"12px 16px",color:"#F0EDE8",fontSize:13,marginBottom:8}}
          />
          {passwordError && (
            <div style={{fontSize:11,color:"#E85A5A",marginBottom:10}}>❌ Mot de passe incorrect, réessayez.</div>
          )}
          <button onClick={handlePasswordSubmit}
            style={{width:"100%",background:"#E8845A",color:"#0F0F13",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,letterSpacing:"0.08em",marginTop:4}}>
            CONNEXION ▶
          </button>
        </div>
      )}
      <div style={{marginTop:20,fontSize:10,color:"#2A2A38",textAlign:"center"}}>Données partagées via ce navigateur</div>
    </div>
  );

  // ── MAIN ──────────────────────────────────────────────────────────────────
  const adminViews  = [{id:"list",label:"Dépenses"},{id:"stats",label:"Stats"},{id:"team",label:"Équipe"},{id:"cats",label:"Catégories"}];
  const memberViews = [{id:"list",label:"Mes dépenses"},{id:"stats",label:"Stats"}];
  const views = isAdmin ? adminViews : memberViews;

  return (
    <>
      {/* TOAST */}
      {toast && (
        <div className="sup" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#1E1E28",border:`1px solid ${toast.color}55`,borderRadius:10,padding:"9px 18px",fontSize:12,color:toast.color,zIndex:999,boxShadow:"0 8px 30px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      {/* HEADER */}
      <div style={{width:"100%",maxWidth:520,padding:"28px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:21,fontWeight:800,letterSpacing:"-0.5px",lineHeight:1}}>{isAdmin?"TABLEAU ADMIN":"MES DÉPENSES"}</div>
            <div style={{fontSize:10,color:"#555",marginTop:3,letterSpacing:"0.1em"}}>MARS 2026 · {currentUser.name.toUpperCase()}</div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {views.map(v=>(
              <button key={v.id} className="tab" onClick={()=>setView(v.id)}
                style={{background:view===v.id?"#E8845A":"#1A1A22",color:view===v.id?"#0F0F13":"#888",borderRadius:6,padding:"5px 8px",fontSize:9,fontWeight:500,letterSpacing:"0.07em",textTransform:"uppercase",position:"relative"}}>
                {v.label}
                {v.id==="list"&&isAdmin&&pendingN>0&&(
                  <span style={{position:"absolute",top:-5,right:-5,background:"#E85A5A",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{pendingN}</span>
                )}
              </button>
            ))}
            {isAdmin&&<button className="tab" onClick={exportCSV} title="Export CSV" style={{background:"#1A1A22",color:"#5AE89B",borderRadius:6,padding:"5px 8px",fontSize:14}}>⬇</button>}
            <button className="tab" onClick={()=>setCurrentUser(null)} title="Déconnexion" style={{background:"#1A1A22",color:"#555",borderRadius:6,padding:"5px 8px",fontSize:13}}>⏏</button>
          </div>
        </div>

        {/* TOTAL */}
        <div style={{background:"#1A1A22",borderRadius:12,padding:"13px 16px",marginTop:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:1}}>{isAdmin?"TOTAL APPROUVÉ (ÉQUIPE)":"MES DÉPENSES APPROUVÉES"}</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#F0EDE8"}}>{fmt(myTotal)}</div>
          </div>
          {isAdmin&&pendingN>0&&<div style={{background:"#E8D45A18",border:"1px solid #E8D45A44",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#E8D45A"}}>{pendingN} en attente</div>}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{width:"100%",maxWidth:520,padding:"16px 20px 0"}}>

        {/* LIST */}
        {view==="list"&&(
          <div className="fade">
            {isAdmin&&(
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {["all","pending","approved","rejected"].map(s=>(
                  <button key={s} className="pill" onClick={()=>setFilterStatus(s)}
                    style={{background:filterStatus===s?(s==="all"?"#F0EDE8":STATUS[s]?.color+"33"):"#1A1A22",color:filterStatus===s?(s==="all"?"#0F0F13":STATUS[s]?.color):"#666",borderRadius:99,padding:"4px 12px",fontSize:10,border:filterStatus===s&&s!=="all"?`1px solid ${STATUS[s]?.color}44`:"1px solid transparent"}}>
                    {s==="all"?"Tout":STATUS[s].icon+" "+STATUS[s].label}
                  </button>
                ))}
                <select value={filterMember} onChange={e=>setFilterMember(e.target.value)}
                  style={{background:"#1A1A22",border:"1px solid #2A2A38",borderRadius:99,padding:"4px 10px",color:"#888",fontSize:10}}>
                  <option value="all">Tous les membres</option>
                  {users.filter(u=>u.role==="member").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {visibleExp.length===0&&<div style={{textAlign:"center",color:"#333",padding:"36px 0",fontSize:12}}>Aucune dépense</div>}
              {visibleExp.map(exp=>{
                const c=getCat(exp.category); const u=getUser(exp.userId); const st=STATUS[exp.status];
                return (
                  <div key={exp.id} className={`row ${animNew===exp.id?"pop":""}`}
                    style={{background:"#16161E",borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:12,borderLeft:`3px solid ${c.color}`}}>
                    <div style={{fontSize:18,marginTop:1}}>{c.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{exp.label}</div>
                      <div style={{fontSize:10,color:"#555",marginTop:2}}>
                        {isAdmin&&<span style={{color:"#777"}}>{u.avatar} {u.name} · </span>}
                        {c.label} · {new Date(exp.date).toLocaleDateString("fr-FR")}
                      </div>
                      {exp.rejectNote&&<div style={{fontSize:10,color:"#E85A5A",marginTop:3}}>↩ {exp.rejectNote}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:c.color}}>{fmt(exp.amount)}</div>
                      <div style={{background:st.bg,color:st.color,borderRadius:99,padding:"2px 8px",fontSize:9}}>{st.icon} {st.label}</div>
                    </div>
                    {isAdmin&&exp.status==="pending"&&(
                      <div className="act" style={{display:"flex",gap:4,marginTop:2}}>
                        <button className="abtn" onClick={()=>approve(exp.id)} style={{background:"#5AE89B18",color:"#5AE89B",borderRadius:6,padding:"5px 8px",fontSize:12,border:"1px solid #5AE89B33"}}>✓</button>
                        <button className="rbtn" onClick={()=>{setRejectId(exp.id);setRejectNote("");}} style={{background:"#E85A5A18",color:"#E85A5A",borderRadius:6,padding:"5px 8px",fontSize:12,border:"1px solid #E85A5A33"}}>✕</button>
                      </div>
                    )}
                    {!isAdmin&&exp.status==="pending"&&(
                      <button className="act" onClick={()=>delExp(exp.id)} style={{background:"none",color:"#E85A5A",fontSize:14,padding:"2px 4px",marginTop:2}}>🗑️</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* STATS */}
        {view==="stats"&&(
          <div className="fade">
            <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",marginBottom:12}}>RÉPARTITION PAR CATÉGORIE (APPROUVÉES)</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {byCat.map(c=>(
                <div key={c.id} style={{background:"#16161E",borderRadius:10,padding:"13px 15px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><span>{c.icon}</span><span style={{fontSize:12}}>{c.label}</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:10,color:"#555"}}>{c.pct.toFixed(0)}%</span>
                      <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:c.color}}>{fmt(c.total)}</span>
                    </div>
                  </div>
                  <div style={{background:"#2A2A35",borderRadius:99,height:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${c.pct}%`,background:c.color,borderRadius:99,transition:"width .7s cubic-bezier(.34,1.56,.64,1)"}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:"#1A1A22",borderRadius:12,padding:"14px 16px",marginTop:14}}>
              <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",marginBottom:10}}>RÉSUMÉ</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  {label:"Transactions",  value:approvedExp.length},
                  {label:"Moyenne",       value:fmt(statTotal/(approvedExp.length||1))},
                  {label:"En attente",    value:expenses.filter(e=>(isAdmin||e.userId===currentUser.id)&&e.status==="pending").length},
                  {label:"Refusées",      value:expenses.filter(e=>(isAdmin||e.userId===currentUser.id)&&e.status==="rejected").length},
                ].map(s=>(
                  <div key={s.label} style={{background:"#13131A",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:9,color:"#555",marginBottom:3}}>{s.label}</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14}}>{s.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* TEAM */}
        {view==="team"&&isAdmin&&(
          <div className="fade">
            <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",marginBottom:12}}>MEMBRES DE L'ÉQUIPE</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {users.filter(u=>u.role==="member").map(u=>{
                const uExp=expenses.filter(e=>e.userId===u.id);
                const uApp=uExp.filter(e=>e.status==="approved").reduce((s,e)=>s+e.amount,0);
                const uPnd=uExp.filter(e=>e.status==="pending").length;

                return (
                  <div key={u.id} style={{background:"#16161E",borderRadius:10,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{fontSize:22}}>{u.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500}}>{u.name}</div>
                        <div style={{fontSize:10,color:"#555",marginTop:1}}>
                          {uExp.length} dépense(s)
                          {uPnd>0&&<span style={{color:"#E8D45A",marginLeft:6}}>· {uPnd} en attente</span>}
                        </div>
                      </div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#5AE89B"}}>{fmt(uApp)}</div>
                    </div>

                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* CATEGORIES */}
        {view==="cats"&&isAdmin&&(
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em"}}>GÉRER LES CATÉGORIES</div>
              <button onClick={()=>{setEditingCat({id:null,label:"",icon:"📦",color:COLORS[0]});setIconOpen(false);}}
                style={{background:"#E8845A",color:"#0F0F13",borderRadius:8,padding:"6px 12px",fontSize:10,fontWeight:700}}>+ NOUVELLE</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {categories.map(c=>(
                <div key={c.id} className="row" style={{background:"#16161E",borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,borderLeft:`3px solid ${c.color}`}}>
                  <div style={{fontSize:20}}>{c.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500}}>{c.label}</div>
                    <div style={{fontSize:9,color:"#555",marginTop:2}}>{expenses.filter(e=>e.category===c.id).length} dépense(s)</div>
                  </div>
                  <div style={{width:12,height:12,borderRadius:"50%",background:c.color}}/>
                  <div className="act" style={{display:"flex",gap:5}}>
                    <button onClick={()=>{setEditingCat({...c});setIconOpen(false);}} style={{background:"#2A2A38",color:"#F0EDE8",borderRadius:6,padding:"4px 8px",fontSize:11}}>✏️</button>
                    {c.id!=="other"&&<button onClick={()=>delCat(c.id)} style={{background:"#E85A5A18",color:"#E85A5A",borderRadius:6,padding:"4px 8px",fontSize:11}}>🗑️</button>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* REJECT MODAL */}
      {rejectId&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
          onClick={e=>e.target===e.currentTarget&&setRejectId(null)}>
          <div className="sup" style={{width:"100%",maxWidth:400,background:"#1E1E28",borderRadius:14,padding:"22px 20px",border:"1px solid #E85A5A33"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:14,color:"#E85A5A"}}>MOTIF DU REFUS</div>
            <textarea value={rejectNote} onChange={e=>setRejectNote(e.target.value)} placeholder="Expliquer le motif..." rows={3}
              style={{width:"100%",background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"10px 12px",color:"#F0EDE8",fontSize:12,resize:"none"}}/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>setRejectId(null)} style={{flex:1,background:"#2A2A38",color:"#888",borderRadius:8,padding:"10px",fontSize:11}}>ANNULER</button>
              <button onClick={()=>reject(rejectId)} style={{flex:2,background:"#E85A5A",color:"#fff",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700}}>CONFIRMER LE REFUS</button>
            </div>
          </div>
        </div>
      )}

      {/* CAT EDITOR */}
      {editingCat&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={e=>e.target===e.currentTarget&&(setEditingCat(null),setIconOpen(false))}>
          <div className="sup" style={{width:"100%",maxWidth:480,background:"#1E1E28",borderRadius:"16px 16px 0 0",padding:"22px 20px 34px",border:"1px solid #2A2A38"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:16}}>{editingCat.id?"MODIFIER":"NOUVELLE CATÉGORIE"}</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:"0.1em",marginBottom:6}}>ICÔNE</div>
              <button onClick={()=>setIconOpen(o=>!o)} style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"7px 12px",fontSize:20,display:"flex",alignItems:"center",gap:8,color:"#F0EDE8"}}>
                {editingCat.icon} <span style={{fontSize:10,color:"#666"}}>▾</span>
              </button>
              {iconOpen&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6,background:"#13131A",borderRadius:8,padding:8,maxHeight:130,overflowY:"auto"}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>{setEditingCat(e=>({...e,icon:ic}));setIconOpen(false);}} style={{background:editingCat.icon===ic?"#2A2A38":"none",border:"none",fontSize:18,padding:"4px 6px",cursor:"pointer",borderRadius:4}}>{ic}</button>)}
                </div>
              )}
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:"0.1em",marginBottom:6}}>NOM</div>
              <input value={editingCat.label} onChange={e=>setEditingCat(ec=>({...ec,label:e.target.value}))} placeholder="Nom..."
                style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12,width:"100%"}}/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:"0.1em",marginBottom:8}}>COULEUR</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {COLORS.map(col=><div key={col} className="cdot" onClick={()=>setEditingCat(ec=>({...ec,color:col}))} style={{width:26,height:26,background:col,outline:editingCat.color===col?`3px solid ${col}`:"none",outlineOffset:3,opacity:editingCat.color===col?1:0.5}}/>)}
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setEditingCat(null);setIconOpen(false);}} style={{flex:1,background:"#2A2A38",color:"#888",borderRadius:8,padding:"10px",fontSize:11}}>ANNULER</button>
              <button onClick={saveCat} style={{flex:2,background:editingCat.label.trim()?"#E8845A":"#2A2A38",color:editingCat.label.trim()?"#0F0F13":"#555",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700}}>
                {editingCat.id?"ENREGISTRER ▶":"CRÉER ▶"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ADD FORM */}
      {showForm&&!isAdmin&&(
        <div className="sup" style={{position:"fixed",bottom:44,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 40px)",maxWidth:440,background:"#1E1E28",borderRadius:16,padding:"18px",boxShadow:"0 20px 60px rgba(0,0,0,.7)",border:"1px solid #2A2A38",zIndex:100}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,marginBottom:14}}>SOUMETTRE UNE DÉPENSE</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <input placeholder="Description..." value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}
              style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12,width:"100%"}}/>
            <div style={{display:"flex",gap:9}}>
              <input placeholder="Montant DA" type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
                style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12,flex:1}}/>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12,flex:1}}/>
            </div>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
              style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12}}>
              {categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
            <input placeholder="Note / justificatif (optionnel)..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
              style={{background:"#13131A",border:"1px solid #2A2A38",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:12,width:"100%"}}/>
            <div style={{display:"flex",gap:9,marginTop:2}}>
              <button onClick={()=>setShowForm(false)} style={{flex:1,background:"#2A2A38",color:"#888",borderRadius:8,padding:"9px",fontSize:11}}>ANNULER</button>
              <button onClick={addExpense} style={{flex:2,background:"#E8845A",color:"#0F0F13",borderRadius:8,padding:"9px",fontSize:11,fontWeight:700}}>SOUMETTRE ▶</button>
            </div>
          </div>
        </div>
      )}

      {/* FAB */}
      {!isAdmin&&(
        <button className="fab" onClick={()=>setShowForm(s=>!s)}
          style={{position:"fixed",bottom:36,right:20,width:50,height:50,borderRadius:"50%",background:showForm?"#2A2A38":"#E8845A",color:showForm?"#888":"#0F0F13",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(232,132,90,.3)",border:"none",zIndex:200,transition:"all .25s"}}>
          {showForm?"✕":"+"}
        </button>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
