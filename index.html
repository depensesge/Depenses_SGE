  <style>
    :root {
      --blue-900: #0F1F3D; --blue-800: #1A3160; --blue-700: #1E4D8C;
      --blue-600: #1D6AE5; --blue-500: #3B82F6; --blue-400: #60A5FA;

      --gray-900: #0F172A; --gray-800: #1E293B; --gray-700: #334155;

    /* Animations */
    .fade-in { animation: fadeIn .3s ease forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .slide-up { animation: slideUp .3s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; color:rgba(255,255,255,.55); font-size:13px; font-weight:500; transition:all .2s; position:relative; }
    .nav-item:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.9); }

    .user-name { font-size:13px; font-weight:600; color:var(--white); }
    .user-role { font-size:10px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.05em; }
    .logout-btn { margin-top:8px; width:100%; padding:8px; background:rgba(255,255,255,.05); color:rgba(255,255,255,.5); border-radius:var(--radius-sm); font-size:12px; transition:all .2s; }

    .table-wrap { overflow:hidden; }

    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; transition:all .2s; cursor:pointer; border:none; }
    .btn-primary { background:var(--blue-600); color:var(--white); box-shadow:0 2px 8px rgba(29,106,229,.3); }
    .btn-primary:hover { background:var(--blue-700); box-shadow:0 4px 16px rgba(29,106,229,.4); transform:translateY(-1px); }

    .btn-sm { padding:6px 12px; font-size:12px; }

    .btn-approve:hover { background:#A7F3D0; }
    .btn-reject  { background:var(--red-bg); color:var(--red-text); border:1px solid #FCA5A5; }
    .btn-reject:hover  { background:#FCA5A5; }
    .btn-icon { width:32px; height:32px; padding:0; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:14px; }

    /* Cat color dot */
    .cat-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }

    /* Bar chart */
    .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .bar-label { font-size:12px; color:var(--gray-600); width:110px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { flex:1; background:var(--gray-100); border-radius:99px; height:8px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:99px; transition:width .8s cubic-bezier(.34,1.56,.64,1); }
    .bar-amt { font-size:12px; font-weight:600; color:var(--gray-700); width:90px; text-align:right; flex-shrink:0; }

    /* Form */
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--gray-600); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
    .form-input { width:100%; padding:10px 14px; background:var(--gray-50); border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); font-size:13px; color:var(--gray-900); transition:border .2s; }

    .form-input.error { border-color:var(--red); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(15,31,61,.5); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .modal { background:var(--white); border-radius:var(--radius-lg); padding:28px; width:100%; max-width:460px; box-shadow:var(--shadow-lg); }

    .modal-footer { display:flex; gap:10px; margin-top:24px; }

    /* Toast */
    .toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; z-index:999; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:8px; }

    .login-page { min-height:100vh; display:flex; background:var(--gray-50); }

    .profile-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .profile-avatar.admin { background:var(--blue-100); }
    .profile-avatar.member { background:var(--gray-100); }
    .profile-name { font-size:14px; font-weight:600; color:var(--gray-900); }
    .profile-role { font-size:11px; color:var(--gray-500); margin-top:1px; }
    .profile-btn.admin-card .profile-role { color:var(--blue-600); font-weight:600; }
    .profile-arrow { margin-left:auto; color:var(--gray-400); font-size:16px; }

    /* FAB */
    .fab { position:fixed; bottom:28px; right:28px; width:52px; height:52px; border-radius:50%; background:var(--blue-600); color:var(--white); font-size:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(29,106,229,.4); z-index:200; transition:all .2s; border:none; cursor:pointer; }
    .fab:hover { transform:scale(1.08); box-shadow:0 8px 28px rgba(29,106,229,.5); }

    #sync-bar { position:fixed; bottom:0; left:240px; right:0; background:var(--white); border-top:1px solid var(--gray-200); padding:5px 24px; font-size:11px; color:var(--gray-400); display:flex; align-items:center; gap:6px; z-index:50; }
    .sync-dot { width:6px; height:6px; background:var(--green); border-radius:50%; }

    /* Team cards */
    .team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
    .team-card { background:var(--white); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); }
    .team-avatar { width:48px; height:48px; border-radius:50%; background:var(--blue-50); border:2px solid var(--blue-100); display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:12px; }
    .team-name { font-size:14px; font-weight:700; color:var(--gray-900); }
    .team-role { font-size:11px; color:var(--gray-500); margin-top:2px; text-transform:uppercase; letter-spacing:.05em; }
    .team-stat { margin-top:14px; padding-top:14px; border-top:1px solid var(--gray-100); display:flex; justify-content:space-between; align-items:center; }

    /* Responsive */
    @media (max-width:768px) {

      .stats-grid { grid-template-columns:1fr; }
      .login-left { display:none; }
      #sync-bar { left:0; }
    }

function updateSyncTime(){ const el=document.getElementById("sync-time"); if(el) el.textContent=new Date().toLocaleTimeString("fr-FR"); }

function App() {

    try { const s=localStorage.getItem("eq_session"); return s?JSON.parse(s):null; } catch { return null; }
  });

  const [rejectId,      setRejectId]      = useState(null);
  const [rejectNote,    setRejectNote]    = useState("");
  const [toast,         setToast]         = useState(null);
  const [form, setForm] = useState({label:"",amount:"",category:"siege",date:new Date().toISOString().slice(0,10),note:""});
  const nextId    = useRef(LS.get("eq_nextid",500));
  const nextCatId = useRef(600);
  const isAdmin = currentUser?.role==="admin";

  // Force push new categories on login
  useEffect(()=>{
    if(!currentUser) return;
    db.ref("eq_cats").set(DEFAULT_CATS);
    LS.set("eq_cats", DEFAULT_CATS);
  },[currentUser]);

  useEffect(()=>{
    if(!currentUser) return;
    const refs=[];

    // Expenses — realtime, reconnect on disconnect
    const er=db.ref("eq_expenses");
    er.on("value", s=>{
      if(s.exists()) {
        const val = s.val();
        const arr = Array.isArray(val) ? val : Object.values(val);
        setExpenses(arr.filter(e=>e&&e.id));
      } else {
        setExpenses([]);
      }
    }, err=>console.warn("Firebase expenses error:", err));
    refs.push(er);

    // Categories
    const cr=db.ref("eq_cats");
    cr.on("value", s=>{ if(s.exists()) setCategories(Array.isArray(s.val()) ? s.val() : Object.values(s.val())); },
      err=>console.warn("Firebase cats error:", err));
    refs.push(cr);

    // Users
    const ur=db.ref("eq_users");
    ur.on("value", s=>{ if(s.exists()) setUsers(Array.isArray(s.val()) ? s.val() : Object.values(s.val())); },
      err=>console.warn("Firebase users error:", err));
    refs.push(ur);

    // Keep connection alive on mobile (prevents Firebase from going offline)
    const connRef=db.ref(".info/connected");
    connRef.on("value", s=>{
      const el=document.getElementById("sync-time");
      if(el) el.textContent = s.val() ? new Date().toLocaleTimeString("fr-FR") : "reconnexion...";
    });
    refs.push(connRef);

    return ()=>refs.forEach(r=>r.off());
  },[currentUser]);

  // Aggressive sync: poll every 5s + refresh when page becomes visible
  useEffect(()=>{
    if(!currentUser) return;

    function fetchAll() {
      db.ref("eq_expenses").once("value").then(s=>{
        if(s.exists()) {
          const val = s.val();
          const arr = Array.isArray(val) ? val : Object.values(val);
          setExpenses(arr.filter(e=>e&&e.id));
        }
      }).catch(()=>{});
    }

    // Poll every 5s
    const iv = setInterval(fetchAll, 5000);

    // Re-fetch when user comes back to the tab/app (mobile background → foreground)
    function onVisible() { if(document.visibilityState==="visible") fetchAll(); }
    document.addEventListener("visibilitychange", onVisible);

    // Re-fetch when network reconnects
    function onOnline() { fetchAll(); }
    window.addEventListener("online", onOnline);

    return ()=>{
      clearInterval(iv);
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("online", onOnline);
    };
  },[currentUser?.id]);

  const saveExp  = v=>{
    const arr = Array.isArray(v) ? v : Object.values(v);
    setExpenses(arr);
    // Store as object keyed by id for Firebase (avoids array→object conversion issues)
    const obj = {};
    arr.forEach(e=>{ obj[e.id] = e; });
    try { db.ref("eq_expenses").set(obj); updateSyncTime(); } catch {}
    try { localStorage.setItem("eq_expenses", JSON.stringify(arr)); } catch {}
    try { localStorage.setItem("eq_nextid", nextId.current); } catch {}
  };
  const saveCats = v=>{ setCategories(v); LS.set("eq_cats",v); };
  const saveUsrs = v=>{ setUsers(v);      LS.set("eq_users",v); };
  const getCat   = id=>categories.find(c=>c.id===id)||{label:"Autre",icon:"📦",color:"#64748B"};
  const getUser  = id=>users.find(u=>u.id===id)||{name:"Inconnu",avatar:"👤"};
  const showToast= (msg,color="#10B981")=>{ setToast({msg,color}); setTimeout(()=>setToast(null),2500); };

  const myExp      = isAdmin ? expenses : expenses.filter(e=>e.userId===currentUser?.id);
  const visibleExp = isAdmin
    ? expenses.filter(e=>(filterStatus==="all"||e.status===filterStatus)&&(filterMember==="all"||e.userId===filterMember))
    : expenses.filter(e=>e.userId===currentUser?.id);
  const approvedExp  = (isAdmin?expenses:myExp).filter(e=>e.status==="approved");
  const pendingExp   = expenses.filter(e=>e.status==="pending");
  const myTotal      = approvedExp.reduce((s,e)=>s+e.amount,0);
  const pendingTotal = pendingExp.filter(e=>isAdmin||e.userId===currentUser?.id).reduce((s,e)=>s+e.amount,0);
  const statTotal    = approvedExp.reduce((s,e)=>s+e.amount,0);
  const byCat = categories.map(c=>{
    const total=approvedExp.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
    return {...c,total,pct:statTotal>0?(total/statTotal)*100:0};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  function addExpense(){
    if(!form.label||!form.amount||isNaN(parseFloat(form.amount))) return;
    const e={id:nextId.current++,userId:currentUser.id,label:form.label,amount:parseFloat(form.amount),category:form.category,date:form.date,note:form.note,status:"pending"};
    saveExp([e,...expenses]);
    setForm({label:"",amount:"",category:"food",date:new Date().toISOString().slice(0,10),note:""});
    setShowForm(false);
    showToast("Dépense soumise avec succès","#F59E0B");
  }
  function approve(id){ saveExp(expenses.map(e=>e.id===id?{...e,status:"approved",rejectNote:undefined}:e)); showToast("Dépense approuvée"); }
  function reject(id) { saveExp(expenses.map(e=>e.id===id?{...e,status:"rejected",rejectNote}:e)); setRejectId(null); setRejectNote(""); showToast("Dépense refusée","#EF4444"); }
  function delExp(id) { saveExp(expenses.filter(e=>e.id!==id)); }
  function saveCat(){
    if(!editingCat.label.trim()) return;
    const upd=editingCat.id?categories.map(c=>c.id===editingCat.id?{...editingCat}:c):[...categories,{...editingCat,id:"cat_"+(nextCatId.current++)}];
    saveCats(upd); setEditingCat(null);
  }
  function delCat(id){ saveCats(categories.filter(c=>c.id!==id)); saveExp(expenses.map(e=>e.category===id?{...e,category:"other"}:e)); }
  function exportCSV(){
    const rows=[["Date","Membre","Description","Catégorie","Montant (DA)","Statut","Note refus"],
      ...expenses.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
        const c=getCat(e.category),u=getUser(e.userId);
        return [e.date,u.name,`"${e.label.replace(/"/g,'""')}"`,c.label,e.amount,STATUS[e.status].label,e.rejectNote||""];
      })];
    const csv="\uFEFF"+rows.map(r=>r.join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="depenses.csv"; a.click(); URL.revokeObjectURL(url);
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  if(!currentUser) return (
    <div className="login-page">
      <div className="login-left">
        <div className="login-brand">💼 ExpensesPro</div>
        <div className="login-tagline">Gérez les dépenses de votre équipe en toute simplicité, avec validation et suivi en temps réel.</div>
        {[["🔐","Accès sécurisé par profil"],["✅","Validation admin en un clic"],["📊","Statistiques en temps réel"],["🔥","Synchronisé sur tous les appareils"]].map(([icon,text])=>(
          <div key={text} className="login-feat"><div className="login-feat-icon">{icon}</div>{text}</div>
        ))}
      </div>

                    <div>

                  onKeyDown={e=>{ if(e.key==="Enter"){ if(pwInput===loginStep.password){localStorage.setItem("eq_session",JSON.stringify(loginStep));setCurrentUser(loginStep);setLoginStep(null);}else{setPwError(true);setPwInput("");} }}}/>

              </div>
              <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={()=>{ if(pwInput===loginStep.password){localStorage.setItem("eq_session",JSON.stringify(loginStep));setCurrentUser(loginStep);setLoginStep(null);}else{setPwError(true);setPwInput("");} }}>
                Se connecter →

            </>

      </div>
    </div>

          <button className="logout-btn" onClick={()=>{localStorage.removeItem("eq_session");setCurrentUser(null);}}>⏏ Déconnexion</button>
        </div>

            {/* Stats */}
            <div className="stats-grid">
              <div className="stat-card blue">
                <div className="stat-label">Total approuvé</div>
                <div className="stat-value">{fmt(myTotal)}</div>

              </div>
              <div className="stat-card">
                <div className="stat-label">En attente</div>
                <div className="stat-value" style={{color:"#F59E0B"}}>{fmt(pendingTotal)}</div>
                <div className="stat-sub">{pendingExp.filter(e=>isAdmin||e.userId===currentUser.id).length} dépense(s) à valider</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">{isAdmin?"Membres actifs":"Mes dépenses"}</div>
                <div className="stat-value" style={{color:"#10B981"}}>{isAdmin?users.filter(u=>u.role==="member").length:myExp.length}</div>
                <div className="stat-sub">{isAdmin?"dans l'équipe":"soumises au total"}</div>
              </div>
            </div>

            {/* Chart + recent */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              {/* Bar chart */}
              <div className="card">
                <div className="card-header" style={{paddingBottom:16}}>
                  <div className="card-title">Répartition par catégorie</div>

                <div className="card-body" style={{paddingTop:0}}>
                  {byCat.length===0 ? (
                    <div style={{color:"#94A3B8",fontSize:13,textAlign:"center",padding:"20px 0"}}>Aucune dépense approuvée</div>
                  ) : byCat.map(c=>(
                    <div key={c.id} className="bar-row">
                      <div className="bar-label">{c.icon} {c.label}</div>
                      <div className="bar-track">
                        <div className="bar-fill" style={{width:`${c.pct}%`,background:c.color}}/>
                      </div>
                      <div className="bar-amt">{fmt(c.total)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Recent expenses */}
              <div className="card">

                  <button className="btn btn-ghost btn-sm" onClick={()=>setView("expenses")}>Voir tout →</button>
                </div>
                <div className="card-body" style={{paddingTop:0}}>
                  {(isAdmin?expenses:myExp).slice(0,5).map(exp=>{
                    const c=getCat(exp.category); const st=STATUS[exp.status]; const u=getUser(exp.userId);
                    return (
                      <div key={exp.id} style={{display:"flex",alignItems:"center",gap:12,paddingBottom:12,marginBottom:12,borderBottom:"1px solid #F1F5F9"}}>
                        <div style={{width:36,height:36,borderRadius:10,background:`${c.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{c.icon}</div>

                          <div style={{fontSize:11,color:"#94A3B8",marginTop:1}}>{isAdmin&&<span>{u.name} · </span>}{new Date(exp.date).toLocaleDateString("fr-FR")}</div>

              <div className="form-group">
                <label className="form-label">Montant (DA)</label>
                <input className="form-input" type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Catégorie</label>
              <select className="form-input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Justificatif / Note (optionnel)</label>
              <input className="form-input" placeholder="Précisions supplémentaires..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowForm(false)}>Annuler</button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={addExpense}>Soumettre pour validation →</button>
            </div>
          </div>
        </div>
      )}

      {/* ── REJECT MODAL ── */}
      {rejectId && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setRejectId(null)}>
          <div className="modal pop" style={{maxWidth:400}}>
            <div className="modal-title" style={{color:"#EF4444"}}>Refuser la dépense</div>
            <div className="form-group">
              <label className="form-label">Motif du refus</label>
              <textarea className="form-input" rows={3} placeholder="Expliquez la raison du refus..." value={rejectNote} onChange={e=>setRejectNote(e.target.value)} style={{resize:"none"}}/>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setRejectId(null)}>Annuler</button>
              <button className="btn" style={{background:"#EF4444",color:"#fff",flex:1,justifyContent:"center"}} onClick={()=>reject(rejectId)}>Confirmer le refus</button>
            </div>
          </div>
        </div>
      )}

      {/* ── CATEGORY EDITOR ── */}
      {editingCat && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setEditingCat(null),setIconOpen(false))}>
          <div className="modal pop">
            <div className="modal-title">{editingCat.id?"Modifier la catégorie":"Nouvelle catégorie"}</div>
            <div className="form-group">
              <label className="form-label">Icône</label>
              <button onClick={()=>setIconOpen(o=>!o)} style={{background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontSize:20,display:"flex",alignItems:"center",gap:8,color:"#475569",cursor:"pointer"}}>
                {editingCat.icon} <span style={{fontSize:12,color:"#94A3B8"}}>Choisir ▾</span>
              </button>
              {iconOpen && (
                <div className="icon-grid" style={{marginTop:8}}>
                  {ICONS.map(ic=><button key={ic} className={`icon-btn ${editingCat.icon===ic?"selected":""}`} onClick={()=>{setEditingCat(e=>({...e,icon:ic}));setIconOpen(false);}}>{ic}</button>)}
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">Nom</label>
              <input className="form-input" placeholder="Nom de la catégorie..." value={editingCat.label} onChange={e=>setEditingCat(ec=>({...ec,label:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Couleur</label>
              <div className="color-grid">
                {COLORS.map(col=><div key={col} className={`color-swatch ${editingCat.color===col?"selected":""}`} style={{background:col}} onClick={()=>setEditingCat(ec=>({...ec,color:col}))}/>)}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>{setEditingCat(null);setIconOpen(false);}}>Annuler</button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={saveCat}>{editingCat.id?"Enregistrer":"Créer la catégorie"}</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
