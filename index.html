<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpensesPro · Caisse & Banque</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDOG7S4hWibxGwVBe59ybUmGuJ0r-tnZxI",
      authDomain: "gestion-depenses-6bfcc.firebaseapp.com",
      databaseURL: "https://gestion-depenses-6bfcc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gestion-depenses-6bfcc",
      storageBucket: "gestion-depenses-6bfcc.firebasestorage.app",
      messagingSenderId: "474872789938",
      appId: "1:474872789938:web:d3821e317551b8956542ab"
    });
    const db = firebase.database();

    const toArr = v => {
      if (!v) return [];
      if (Array.isArray(v)) return v.filter(e => e && e.id);
      return Object.entries(v).filter(([,e]) => e).map(([k,e]) => ({...e, id: e.id||k}));
    };

    const FB = {
      getExpenses:  ()  => db.ref("eq_expenses").once("value").then(s => toArr(s.val())),
      getRevenues:  ()  => db.ref("eq_revenues").once("value").then(s => toArr(s.val())),
      getCats:      ()  => db.ref("eq_cats").once("value").then(s => s.exists() ? toArr(s.val()) : null),
      setCats:      v   => db.ref("eq_cats").set(v),
      addExpense:   exp => db.ref("eq_expenses/"+String(exp.id)).set(exp),
      markPaid:     id  => db.ref("eq_expenses/"+String(id)).update({status:"paid"}),
      delExpense:   id  => db.ref("eq_expenses/"+String(id)).remove(),
      addRevenue:   rev => db.ref("eq_revenues/"+String(rev.id)).set(rev),
      delRevenue:   id  => db.ref("eq_revenues/"+String(id)).remove(),
    };
  </script>
  <style>
    :root{
      --blue-900:#0F1F3D;--blue-700:#1E4D8C;--blue-600:#1D6AE5;--blue-500:#3B82F6;--blue-100:#DBEAFE;--blue-50:#EFF6FF;
      --gray-900:#0F172A;--gray-700:#334155;--gray-600:#475569;--gray-500:#64748B;--gray-400:#94A3B8;
      --gray-300:#CBD5E1;--gray-200:#E2E8F0;--gray-100:#F1F5F9;--gray-50:#F8FAFC;
      --green:#10B981;--green-bg:#D1FAE5;--green-text:#065F46;
      --amber:#F59E0B;--amber-bg:#FEF3C7;--amber-text:#92400E;
      --red:#EF4444;--red-bg:#FEE2E2;--red-text:#991B1B;
      --caisse:#8B5CF6;--caisse-bg:#EDE9FE;--caisse-text:#4C1D95;
      --banque:#0EA5E9;--banque-bg:#E0F2FE;--banque-text:#0C4A6E;
      --white:#FFFFFF;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
      --shadow-lg:0 10px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.08);
      --r:12px;--r-sm:8px;--r-lg:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--gray-50);font-family:'Inter',sans-serif;color:var(--gray-900);}
    input,select,textarea{outline:none;font-family:inherit;}
    button{cursor:pointer;font-family:inherit;border:none;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
    .fade-in{animation:fadeIn .3s ease forwards;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .slide-up{animation:slideUp .35s cubic-bezier(.34,1.56,.64,1) forwards;}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) forwards;}
    @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

    /* Sidebar */
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--blue-900);display:flex;flex-direction:column;z-index:100;}
    .sb-logo{padding:26px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08);}
    .sb-logo h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;}
    .sb-logo p{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;text-transform:uppercase;letter-spacing:.09em;}
    .sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
    .sb-section{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.12em;padding:10px 10px 3px;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .18s;position:relative;}
    .nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
    .nav-item.active{background:var(--blue-600);color:#fff;box-shadow:0 4px 12px rgba(29,106,229,.35);}
    .nav-badge{position:absolute;right:10px;background:var(--red);color:#fff;border-radius:99px;min-width:17px;height:17px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
    .sb-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);}
    .user-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r-sm);background:rgba(255,255,255,.07);}
    .ua{width:30px;height:30px;border-radius:50%;background:var(--blue-600);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
    .un{font-size:12px;font-weight:600;color:#fff;}
    .ur{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;}
    .logout-btn{margin-top:7px;width:100%;padding:7px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);border-radius:var(--r-sm);font-size:11px;transition:all .2s;}
    .logout-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);}

    /* Main */
    .main{margin-left:240px;padding:28px 28px 70px;}
    .ph{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;}
    .pt{font-family:'Plus Jakarta Sans',sans-serif;font-size:23px;font-weight:800;color:var(--gray-900);letter-spacing:-.4px;}
    .ps{font-size:12px;color:var(--gray-500);margin-top:3px;}

    /* Solde cards */
    .solde-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:22px;}
    .solde-card{border-radius:var(--r-lg);padding:20px 22px;border:1px solid var(--gray-200);background:var(--white);position:relative;overflow:hidden;}
    .solde-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
    .solde-card.caisse::before{background:var(--caisse);}
    .solde-card.banque::before{background:var(--banque);}
    .solde-card.total::before{background:var(--blue-600);}
    .sc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px;}
    .sc-icon.caisse{background:var(--caisse-bg);}
    .sc-icon.banque{background:var(--banque-bg);}
    .sc-icon.total{background:var(--blue-50);}
    .sc-label{font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
    .sc-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.4px;}
    .sc-sub{font-size:11px;color:var(--gray-400);margin-top:4px;}
    .sc-breakdown{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100);}
    .sc-br-item{flex:1;}
    .sc-br-label{font-size:10px;color:var(--gray-400);}
    .sc-br-val{font-size:12px;font-weight:700;margin-top:1px;}

    /* Cards */
    .card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--gray-200);}
    .card-hdr{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;}
    .card-title{font-size:13px;font-weight:700;color:var(--gray-700);}

    /* Table */
    table{width:100%;border-collapse:collapse;}
    th{font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);text-align:left;}
    td{padding:12px 14px;border-bottom:1px solid var(--gray-100);font-size:13px;color:var(--gray-700);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--gray-50);}
    .row-acts{opacity:0;transition:opacity .15s;display:flex;gap:6px;}
    tr:hover .row-acts{opacity:1;}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;}
    .badge.pending{background:var(--amber-bg);color:var(--amber-text);}
    .badge.paid{background:var(--green-bg);color:var(--green-text);}
    .badge.caisse{background:var(--caisse-bg);color:var(--caisse-text);}
    .badge.banque{background:var(--banque-bg);color:var(--banque-text);}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;transition:all .18s;cursor:pointer;border:none;}
    .btn-primary{background:var(--blue-600);color:#fff;box-shadow:0 2px 8px rgba(29,106,229,.25);}
    .btn-primary:hover{background:var(--blue-700);transform:translateY(-1px);}
    .btn-caisse{background:var(--caisse);color:#fff;}
    .btn-caisse:hover{background:#7C3AED;}
    .btn-banque{background:var(--banque);color:#fff;}
    .btn-banque:hover{background:#0284C7;}
    .btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200);}
    .btn-ghost:hover{background:var(--gray-50);}
    .btn-sm{padding:5px 11px;font-size:11px;}
    .btn-icon{width:28px;height:28px;padding:0;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:12px;}
    .btn-pay{background:var(--green-bg);color:var(--green-text);border:1px solid #A7F3D0;font-size:11px;padding:5px 10px;}
    .btn-pay:hover{background:#A7F3D0;}

    /* Filters */
    .filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
    .filter-btn{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:500;background:var(--white);border:1px solid var(--gray-200);color:var(--gray-600);transition:all .18s;cursor:pointer;}
    .filter-btn.active{background:var(--blue-600);border-color:var(--blue-600);color:#fff;}
    .filter-select{padding:5px 11px;border-radius:99px;font-size:11px;background:var(--white);border:1px solid var(--gray-200);color:var(--gray-600);cursor:pointer;}

    /* Form */
    .form-group{margin-bottom:13px;}
    .form-label{display:block;font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
    .form-input{width:100%;padding:9px 12px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-size:13px;color:var(--gray-900);transition:border .18s;}
    .form-input:focus{border-color:var(--blue-500);background:#fff;}
    .form-input.error{border-color:var(--red);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    /* Type selector */
    .type-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .type-btn{padding:12px;border-radius:var(--r-sm);border:2px solid var(--gray-200);cursor:pointer;text-align:center;transition:all .18s;background:#fff;}
    .type-btn.caisse.selected{border-color:var(--caisse);background:var(--caisse-bg);}
    .type-btn.banque.selected{border-color:var(--banque);background:var(--banque-bg);}
    .type-btn:hover{border-color:var(--gray-300);}
    .type-icon{font-size:22px;margin-bottom:4px;}
    .type-label{font-size:12px;font-weight:600;color:var(--gray-700);}
    .type-sub{font-size:10px;color:var(--gray-400);margin-top:2px;}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(15,31,61,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
    .modal{background:#fff;border-radius:var(--r-lg);padding:24px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);}
    .modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:var(--gray-900);margin-bottom:16px;}
    .modal-footer{display:flex;gap:10px;margin-top:18px;}

    /* Toast */
    .toast{position:fixed;top:18px;right:18px;padding:10px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);color:#fff;display:flex;align-items:center;gap:7px;}

    /* Progress bar */
    .progress-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--blue-600);z-index:9999;}

    /* Login */
    .login-page{min-height:100vh;display:flex;}
    .login-left{width:400px;flex-shrink:0;background:var(--blue-900);display:flex;flex-direction:column;justify-content:center;padding:48px;}
    .login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--gray-50);}
    .login-brand{font-family:'Plus Jakarta Sans',sans-serif;font-size:25px;font-weight:800;color:#fff;margin-bottom:6px;}
    .login-tag{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:34px;}
    .login-feat{display:flex;align-items:center;gap:10px;margin-bottom:12px;color:rgba(255,255,255,.65);font-size:12px;}
    .login-feat-icon{width:28px;height:28px;background:rgba(255,255,255,.1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .login-card{background:#fff;border-radius:var(--r-lg);padding:32px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);border:1px solid var(--gray-200);}
    .login-card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
    .login-card-sub{font-size:12px;color:var(--gray-500);margin-bottom:22px;}
    .profile-grid{display:flex;flex-direction:column;gap:8px;}
    .profile-btn{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:var(--r-sm);border:1.5px solid var(--gray-200);background:#fff;cursor:pointer;transition:all .18s;text-align:left;width:100%;}
    .profile-btn:hover{border-color:var(--blue-500);background:var(--blue-50);}
    .profile-btn.adm{border-color:var(--blue-200);background:var(--blue-50);}
    .profile-btn.adm:hover{border-color:var(--blue-500);background:var(--blue-100);}

    /* Sync bar */
    #sync-bar{position:fixed;bottom:0;left:240px;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:5px 22px;font-size:10px;color:var(--gray-400);display:flex;align-items:center;gap:7px;z-index:50;}
    .sync-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
    .sync-dot.ok{background:var(--green);}
    .sync-dot.err{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    @media(max-width:768px){
      .sidebar,.login-left{display:none;}
      .main{margin-left:0;padding:16px;}
      .solde-grid{grid-template-columns:1fr;}
      #sync-bar{left:0;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="sync-bar">
  <span class="sync-dot ok" id="sdot"></span>
  <span id="sst">Chargement...</span> · <span id="stm">—</span>
  <span id="rbtn" style="margin-left:auto;cursor:pointer;color:var(--blue-600);display:none" onclick="window._loadAll&&window._loadAll()">↻ Actualiser</span>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_CATS = [
  { id:"siege",       label:"Frais Siège",         icon:"🏢", color:"#1D6AE5" },
  { id:"atelier",     label:"Frais Atelier",        icon:"🔧", color:"#8B5CF6" },
  { id:"projets",     label:"Frais Projets",        icon:"📋", color:"#10B981" },
  { id:"essence",     label:"Essence",              icon:"⛽", color:"#F59E0B" },
  { id:"maintenance", label:"Maintenance Voitures", icon:"🚘", color:"#EF4444" },
  { id:"deplacement", label:"Déplacements",         icon:"✈️", color:"#06B6D4" },
  { id:"other",       label:"Autre",                icon:"📦", color:"#64748B" },
];

const COLORS = ["#1D6AE5","#8B5CF6","#EC4899","#10B981","#F59E0B","#EF4444","#64748B","#06B6D4","#84CC16","#F97316","#6366F1","#14B8A6"];
const ICONS  = ["🏢","🔧","📋","⛽","🚘","✈️","📦","🍽️","🚗","🏠","💊","🎮","☕","🛒","💡","📱","🎓","🏦","🎁","📊","💰","🏭"];

const DEFAULT_USERS = [
  { id:"admin",  name:"Youcef",  role:"admin",  avatar:"👑", password:"admin2026" },
  { id:"admin2", name:"Souad",   role:"admin",  avatar:"👑", password:"admin2027" },
  { id:"user1",  name:"Belmahi", role:"member", avatar:"👤", password:"b123" },
  { id:"user2",  name:"Tariq",   role:"member", avatar:"👤", password:"t123" },
  { id:"user3",  name:"Amine",   role:"member", avatar:"👤", password:"a123" },
];

// vtype: "caisse" | "banque"
const VTYPES = {
  caisse: { label:"Virement Caisse",   icon:"🏦", color:"#8B5CF6", cls:"caisse" },
  banque: { label:"Virement Bancaire", icon:"🏛️", color:"#0EA5E9", cls:"banque" },
};

function fmt(n) { return new Intl.NumberFormat("fr-DZ",{maximumFractionDigits:0}).format(n||0)+" DA"; }
function fmtS(n) { const s=fmt(Math.abs(n||0)); return (n||0)>=0?"+"+s:"-"+s; }

function setSyncUI(ok, msg, time) {
  const d=document.getElementById("sdot"),s=document.getElementById("sst"),t=document.getElementById("stm");
  if(d){d.className="sync-dot "+(ok?"ok":"err");}
  if(s) s.textContent=msg;
  if(t&&time) t.textContent=time;
}

function App() {
  const [currentUser, setCurrentUser] = useState(()=>{ try{const s=localStorage.getItem("eq_session");return s?JSON.parse(s):null;}catch{return null;} });
  const [loginStep,   setLoginStep]   = useState(null);
  const [pwInput,     setPwInput]     = useState("");
  const [pwError,     setPwError]     = useState(false);
  const [users]                       = useState(DEFAULT_USERS);
  const [categories,  setCategories]  = useState(DEFAULT_CATS);
  const [expenses,    setExpenses]    = useState([]);
  const [revenues,    setRevenues]    = useState([]);
  const [view,        setView]        = useState("dashboard");
  const [fStatus,     setFStatus]     = useState("all");
  const [fVtype,      setFVtype]      = useState("all");
  const [fMember,     setFMember]     = useState("all");
  const [showExpForm, setShowExpForm] = useState(false);
  const [showRevForm, setShowRevForm] = useState(false);
  const [editingCat,  setEditingCat]  = useState(null);
  const [iconOpen,    setIconOpen]    = useState(false);
  const [toast,       setToast]       = useState(null);
  const [loading,     setLoading]     = useState(false);

  const [expForm, setExpForm] = useState({label:"",amount:"",category:"siege",vtype:"caisse",date:new Date().toISOString().slice(0,10),note:""});
  const [revForm, setRevForm] = useState({label:"",amount:"",vtype:"caisse",userId:"user1",date:new Date().toISOString().slice(0,10),note:""});

  const isAdmin = currentUser?.role==="admin";

  // ── Load ────────────────────────────────────────────────────────────────────
  const loadAll = useCallback(async () => {
    try {
      const [exps, revs] = await Promise.all([FB.getExpenses(), FB.getRevenues()]);
      setExpenses(exps); setRevenues(revs);
      setSyncUI(true, "Synchronisé", new Date().toLocaleTimeString("fr-FR"));
    } catch { setSyncUI(false, "Erreur connexion", null); }
  }, []);

  useEffect(() => {
    if (!currentUser) return;
    FB.getCats().then(c => { if(c&&c.length) setCategories(c); else FB.setCats(DEFAULT_CATS); }).catch(()=>{});
    loadAll();
    window._loadAll = loadAll;
    const rb = document.getElementById("rbtn");
    if (rb) rb.style.display = "block";
    const iv = setInterval(loadAll, 5000);
    const onVis = () => { if(document.visibilityState==="visible") loadAll(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  }, [currentUser?.id]);

  // ── Finance calculations ─────────────────────────────────────────────────────
  function calcSoldes() {
    const totalCaisse  = revenues.filter(r=>r.vtype==="caisse").reduce((s,r)=>s+(r.amount||0),0);
    const totalBanque  = revenues.filter(r=>r.vtype==="banque").reduce((s,r)=>s+(r.amount||0),0);
    const depCaisse    = expenses.filter(e=>e.vtype==="caisse"&&e.status==="paid").reduce((s,e)=>s+(e.amount||0),0);
    const depBanque    = expenses.filter(e=>e.vtype==="banque"&&e.status==="paid").reduce((s,e)=>s+(e.amount||0),0);
    const depPendingC  = expenses.filter(e=>e.vtype==="caisse"&&e.status==="pending").reduce((s,e)=>s+(e.amount||0),0);
    const depPendingB  = expenses.filter(e=>e.vtype==="banque"&&e.status==="pending").reduce((s,e)=>s+(e.amount||0),0);
    return {
      caisse: { entrees:totalCaisse, sorties:depCaisse, solde:totalCaisse-depCaisse, pending:depPendingC },
      banque: { entrees:totalBanque, sorties:depBanque, solde:totalBanque-depBanque, pending:depPendingB },
    };
  }

  async function markPaid(id) {
    setExpenses(prev=>prev.map(e=>String(e.id)===String(id)?{...e,status:"paid"}:e));
    setLoading(true);
    try { await FB.markPaid(id); showToast("Dépense marquée Payée ✅"); }
    catch(err) { showToast("Erreur: "+err.message,"#EF4444"); await loadAll(); }
    setLoading(false);
  }

  async function addExpense() {
    if (!expForm.label||!expForm.amount||isNaN(parseFloat(expForm.amount))) return;
    const exp = {id:Date.now(), userId:currentUser.id, label:expForm.label, amount:parseFloat(expForm.amount), category:expForm.category, vtype:expForm.vtype, date:expForm.date, note:expForm.note||"", status:"pending"};
    setLoading(true);
    try {
      await FB.addExpense(exp); await loadAll();
      setExpForm({label:"",amount:"",category:"siege",vtype:"caisse",date:new Date().toISOString().slice(0,10),note:""});

  function exportCSV() {
    const rows = [
      ["Type","Sous-type","Date","Membre","Description","Catégorie","Montant (DA)","Statut"],
      ...revenues.sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(r=>{
        const u=getUser(r.userId); const vt=VTYPES[r.vtype]||VTYPES.caisse;
        return ["Revenu",vt.label,r.date,u.name,r.label||"","—",r.amount,"Enregistré"];
      }),
      ...expenses.sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>{
        const c=getCat(e.category),u=getUser(e.userId),vt=VTYPES[e.vtype]||VTYPES.caisse;
        return ["Dépense",vt.label,e.date,u.name,e.label||"",c.label,e.amount,e.status==="paid"?"Payée":"En attente"];
      }),
    ];
    const csv="\uFEFF"+rows.map(r=>r.join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="finances.csv"; a.click(); URL.revokeObjectURL(url);
  }

                      <td style={{fontWeight:700,color:c.color,fontSize:13}}>{fmt(exp.amount)}</td>
                      <td><span className={`badge ${exp.status==="paid"?"paid":"pending"}`}>{exp.status==="paid"?"✅ Payée":"⏳ En attente"}</span></td>
                      <td><div className="row-acts">
                        {isAdmin&&exp.status==="pending"&&<button className="btn btn-pay" onClick={()=>markPaid(exp.id)} disabled={loading}>✓ Payer</button>}
                        {!isAdmin&&exp.status==="pending"&&<button className="btn btn-ghost btn-sm btn-icon" onClick={()=>delExpense(exp.id)} disabled={loading}>🗑️</button>}
                      </div></td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── CATÉGORIES (admin) ── */}
        {view==="cats" && isAdmin && (
          <div className="fade-in">
            <div className="ph">
              <div><div className="pt">Catégories de dépenses</div></div>
              <button className="btn btn-primary" onClick={()=>{setEditingCat({id:null,label:"",icon:"📦",color:COLORS[0]});setIconOpen(false);}}>+ Nouvelle</button>
            </div>
            <div className="card">
              <table>
                <thead><tr><th>Catégorie</th><th>Couleur</th><th>Dépenses</th><th></th></tr></thead>
                <tbody>
                  {categories.map(c=>(
                    <tr key={c.id}>
                      <td><div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:19}}>{c.icon}</span><span style={{fontWeight:600}}>{c.label}</span></div></td>
                      <td><div style={{width:14,height:14,borderRadius:"50%",background:c.color}}/></td>
                      <td style={{fontSize:12,color:"var(--gray-500)"}}>{expenses.filter(e=>e.category===c.id).length}</td>
                      <td><div className="row-acts">
                        <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>{setEditingCat({...c});setIconOpen(false);}}>✏️</button>
                        {c.id!=="other"&&<button className="btn btn-ghost btn-sm btn-icon" onClick={async()=>{const u=categories.filter(x=>x.id!==c.id);setCategories(u);await FB.setCats(u).catch(()=>{});}}>🗑️</button>}
                      </div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </main>

      {/* ── AJOUTER DÉPENSE ── */}
      {showExpForm && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowExpForm(false)}>
          <div className="modal pop">
            <div className="modal-title">💳 Nouvelle dépense</div>
            <div className="form-group">
              <label className="form-label">Type de paiement</label>
              <div className="type-selector">
                {Object.entries(VTYPES).map(([k,vt])=>(
                  <div key={k} className={`type-btn ${k} ${expForm.vtype===k?"selected":""}`} onClick={()=>setExpForm(f=>({...f,vtype:k}))}>
                    <div className="type-icon">{vt.icon}</div>
                    <div className="type-label">{vt.label}</div>
                    <div className="type-sub">{k==="caisse"?"Paiement en espèces":"Virement bancaire"}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="form-group"><label className="form-label">Description</label>
              <input className="form-input" placeholder="Ex: Carburant, Repas..." value={expForm.label} onChange={e=>setExpForm(f=>({...f,label:e.target.value}))}/>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Montant (DA)</label>
                <input className="form-input" type="number" placeholder="0" value={expForm.amount} onChange={e=>setExpForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div className="form-group"><label className="form-label">Date</label>
                <input className="form-input" type="date" value={expForm.date} onChange={e=>setExpForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Catégorie</label>
              <select className="form-input" value={expForm.category} onChange={e=>setExpForm(f=>({...f,category:e.target.value}))}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Note (optionnel)</label>
              <input className="form-input" placeholder="Précisions..." value={expForm.note} onChange={e=>setExpForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowExpForm(false)}>Annuler</button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={addExpense} disabled={loading}>{loading?"Envoi...":"Soumettre →"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── AJOUTER VIREMENT (admin) ── */}
      {showRevForm && isAdmin && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowRevForm(false)}>
          <div className="modal pop">
            <div className="modal-title">💰 Enregistrer un virement</div>
            <div className="form-group">
              <label className="form-label">Type de virement</label>
              <div className="type-selector">
                {Object.entries(VTYPES).map(([k,vt])=>(
                  <div key={k} className={`type-btn ${k} ${revForm.vtype===k?"selected":""}`} onClick={()=>setRevForm(f=>({...f,vtype:k}))}>
                    <div className="type-icon">{vt.icon}</div>
                    <div className="type-label">{vt.label}</div>
                    <div className="type-sub">{k==="caisse"?"Alimenter la caisse":"Alimenter le compte banque"}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="form-group"><label className="form-label">Membre concerné</label>
              <select className="form-input" value={revForm.userId} onChange={e=>setRevForm(f=>({...f,userId:e.target.value}))}>
                {users.filter(u=>u.role==="member").map(u=><option key={u.id} value={u.id}>{u.avatar} {u.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Description</label>
              <input className="form-input" placeholder="Ex: Dotation Caisse Mars, Virement salaire..." value={revForm.label} onChange={e=>setRevForm(f=>({...f,label:e.target.value}))}/>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Montant (DA)</label>
                <input className="form-input" type="number" placeholder="0" value={revForm.amount} onChange={e=>setRevForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div className="form-group"><label className="form-label">Date</label>
                <input className="form-input" type="date" value={revForm.date} onChange={e=>setRevForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Note (optionnel)</label>
              <input className="form-input" placeholder="Précisions..." value={revForm.note} onChange={e=>setRevForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowRevForm(false)}>Annuler</button>
              <button className={`btn ${revForm.vtype==="caisse"?"btn-caisse":"btn-banque"}`} style={{flex:1,justifyContent:"center"}} onClick={addRevenue} disabled={loading}>
                {loading?"Envoi...":VTYPES[revForm.vtype].icon+" Enregistrer"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── CATÉGORIE EDITOR ── */}
      {editingCat && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&(setEditingCat(null),setIconOpen(false))}>
          <div className="modal pop">
            <div className="modal-title">{editingCat.id?"Modifier":"Nouvelle catégorie"}</div>
            <div className="form-group"><label className="form-label">Icône</label>
              <button onClick={()=>setIconOpen(o=>!o)} style={{background:"var(--gray-50)",border:"1.5px solid var(--gray-200)",borderRadius:8,padding:"7px 12px",fontSize:19,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                {editingCat.icon} <span style={{fontSize:11,color:"var(--gray-400)"}}>Choisir ▾</span>
              </button>
              {iconOpen&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:7,background:"var(--gray-50)",borderRadius:8,padding:8,maxHeight:130,overflowY:"auto"}}>
                {ICONS.map(ic=><button key={ic} onClick={()=>{setEditingCat(e=>({...e,icon:ic}));setIconOpen(false);}} style={{fontSize:19,padding:"5px 7px",borderRadius:6,cursor:"pointer",background:editingCat.icon===ic?"var(--blue-100)":"none",border:"none"}}>{ic}</button>)}
              </div>}
            </div>
            <div className="form-group"><label className="form-label">Nom</label>
              <input className="form-input" placeholder="Nom..." value={editingCat.label} onChange={e=>setEditingCat(ec=>({...ec,label:e.target.value}))}/>
            </div>
            <div className="form-group"><label className="form-label">Couleur</label>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {COLORS.map(col=><div key={col} onClick={()=>setEditingCat(ec=>({...ec,color:col}))} style={{width:24,height:24,borderRadius:"50%",background:col,cursor:"pointer",border:editingCat.color===col?"3px solid var(--gray-900)":"2px solid transparent",transition:"all .15s"}}/>)}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>{setEditingCat(null);setIconOpen(false);}}>Annuler</button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={saveCat}>{editingCat.id?"Enregistrer":"Créer"}</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
